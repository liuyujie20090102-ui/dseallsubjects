<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明太祖 · 筆記</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ed;
            --text-primary: #2c2416;
            --text-secondary: #5c5347;
            --text-muted: #a09880;
            --gold: #8b6914;
            --gold-light: #c4a97d;
            --ink-light: rgba(60,40,20,0.06);
            --mountain-far: rgba(120,100,70,0.12);
            --mountain-mid: rgba(100,80,55,0.16);
            --mountain-near: rgba(80,60,40,0.2);
            --cloud: rgba(255,252,245,0.7);
            --card-bg: rgba(255,253,248,0.8);
            --font-cn: "Noto Serif TC","PingFang SC","Microsoft YaHei","KaiTi",serif;
            --font-en: "Inter","Helvetica Neue",sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background-color:var(--bg);
            font-family:var(--font-cn);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:32px 20px 48px;
            position:relative;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }
        body::before{
            content:"";
            position:fixed;top:0;left:0;
            width:100%;height:100%;
            pointer-events:none;z-index:0;
            background-image:
                repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(139,119,80,0.012) 3px,rgba(139,119,80,0.012) 4px),
                repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(139,119,80,0.008) 5px,rgba(139,119,80,0.008) 6px);
            opacity:0.7;
        }
        .mountains{position:fixed;bottom:0;left:0;width:100%;height:30%;pointer-events:none;z-index:0}
        .mountain{position:absolute;bottom:0}
        .mountain.m1{left:-8%;width:45%;height:55%;background:var(--mountain-far);border-radius:55% 55% 0 0}
        .mountain.m2{left:22%;width:50%;height:68%;background:var(--mountain-mid);border-radius:50% 48% 0 0}
        .mountain.m3{right:-8%;width:42%;height:60%;background:var(--mountain-near);border-radius:52% 52% 0 0}
        .clouds{position:fixed;bottom:12%;left:0;width:100%;height:18%;pointer-events:none;z-index:0}
        .cloud{position:absolute;background:var(--cloud);border-radius:50%;filter:blur(28px)}
        .cloud.c1{width:260px;height:50px;left:8%;bottom:30px;opacity:0.5}
        .cloud.c2{width:220px;height:42px;right:12%;bottom:15px;opacity:0.4}
        .cloud.c3{width:180px;height:35px;left:50%;bottom:8px;opacity:0.35;transform:translateX(-50%)}
        .birds{position:fixed;top:12%;right:12%;pointer-events:none;z-index:0;opacity:0.3}
        .bird{display:inline-block;font-size:13px;margin:0 5px;animation:birdFloat 6s ease-in-out infinite}
        .bird:nth-child(2){animation-delay:1.5s;font-size:9px}
        .bird:nth-child(3){animation-delay:3s;font-size:11px}
        @keyframes birdFloat{
            0%,100%{transform:translateY(0) translateX(0)}
            25%{transform:translateY(-7px) translateX(3px)}
            50%{transform:translateY(-2px) translateX(8px)}
            75%{transform:translateY(-9px) translateX(3px)}
        }

        .container{position:relative;z-index:1;width:100%;max-width:650px}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
        .back-link{color:var(--text-muted);text-decoration:none;font-size:14px;letter-spacing:1px;transition:color 0.3s}
        .back-link:hover{color:var(--text-primary)}
        .page-indicator{font-family:var(--font-en);font-size:13px;color:var(--text-muted);letter-spacing:1px}

        .page-card{
            background:var(--card-bg);
            backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
            border:1px solid rgba(180,160,130,0.2);
            border-radius:16px;
            padding:40px 32px;
            box-shadow:0 2px 20px rgba(60,40,20,0.04);
        }

        .note-title{text-align:center;font-size:24px;font-weight:700;color:var(--text-primary);letter-spacing:3px;margin-bottom:24px}
        .section-label{text-align:center;font-size:16px;font-weight:600;color:var(--text-muted);letter-spacing:3px;margin-bottom:20px}
        .item-title{font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:14px;letter-spacing:1px}
        .content{font-size:16px;color:var(--text-secondary);line-height:2.1;letter-spacing:0.5px}
        .content p{margin-bottom:8px}
        .content ul{list-style:none;padding-left:0;margin-bottom:12px}
        .content ul li{padding:4px 0 4px 20px;position:relative;line-height:2}
        .content ul li::before{content:"·";position:absolute;left:4px;color:var(--gold-light);font-weight:bold;font-size:18px}
        .content ul li.sub{padding-left:36px}
        .content ul li.sub::before{content:"·";left:18px;color:var(--text-muted);font-size:14px}
        .content ul li.sub2{padding-left:48px}
        .content ul li.sub2::before{content:"·";left:32px;color:var(--text-muted);font-size:12px}
        .content strong{color:var(--text-primary);font-weight:600}

        .quote-block{margin:14px 0;padding:14px 18px;border-left:3px solid var(--gold-light);background:rgba(196,169,125,0.06);border-radius:0 8px 8px 0;font-style:italic;color:var(--text-secondary);font-size:15px;line-height:1.9}
        .quote-block .quote-author{display:block;text-align:right;font-style:normal;font-size:13px;color:var(--text-muted);margin-top:4px}

        .nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:12px}
        .nav-btn{padding:10px 22px;background:rgba(255,253,248,0.7);border:1px solid rgba(180,160,130,0.25);border-radius:20px;cursor:pointer;font-family:var(--font-cn);font-size:14px;color:var(--text-secondary);letter-spacing:1px;transition:all 0.3s}
        .nav-btn:hover{background:rgba(180,160,130,0.12);color:var(--text-primary)}
        .nav-btn:disabled{opacity:0.3;cursor:default;pointer-events:none}
        .nav-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:240px}
        .nav-dot{width:5px;height:5px;border-radius:50%;background:var(--text-muted);opacity:0.3;cursor:pointer;transition:all 0.3s}
        .nav-dot.active{opacity:1;background:var(--gold);width:16px;border-radius:3px}

        .footer{text-align:center;font-family:var(--font-en);font-size:11px;color:var(--text-muted);letter-spacing:2px;padding-top:24px}

        @media(max-width:480px){
            .page-card{padding:24px 16px}
            .item-title{font-size:16px}
            .content{font-size:15px}
            .nav-btn{padding:8px 14px;font-size:13px}
        }
    </style>
</head>
<body>

    <div class="mountains">
        <div class="mountain m1"></div>
        <div class="mountain m2"></div>
        <div class="mountain m3"></div>
    </div>
    <div class="clouds">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>

    <div class="birds">
        <span class="bird">⩳</span>
        <span class="bird">⩳</span>

    <div class="container">
        <div class="top-bar">
            <a href="1.html" class="back-link">← 返回明朝</a>
            <span class="page-indicator" id="page-indicator">1 / 18</span>
        </div>
        <div class="page-card"><div id="page-content"></div></div>
        <div class="nav-bar">
            <button class="nav-btn" id="prev-btn" onclick="prevPage()">← 上一頁</button>
            <div class="nav-dots" id="nav-dots"></div>
            <button class="nav-btn" id="next-btn" onclick="nextPage()">下一頁 →</button>
        </div>
        <div class="footer">── Shelly Liu ──</div>
    </div>

    <script>
        const pages = [
            // 1. 集权原因
            `<div class="note-title">👑 明太祖</div>
             <div class="section-label">── 一、集權原因 ──</div>
             <div class="content">
             <p><strong>1. 個人性格與經歷</strong></p>
             <ul>
             <li>出身貧苦，曾為僧侶、乞丐，養成<strong>猜忌多疑、權力欲極強</strong>的性格</li>
             <li>即位後猜忌<strong>劉基、徐達、李善長</strong>等開國功臣</li>
             </ul>
             <p><strong>2. 借鑑前朝歷史教訓</strong></p>
             <ul>
             <li>唐代地方權力過大導致藩鎮割據</li>
             <li>元代權臣可廢立皇帝</li>
             <li>宋代過分集權但對外積弱</li>
             <li>太祖取宋朝集權之長（皇權穩固），避其積弱之短，用自己方法集權</li>
             </ul>
             <p><strong>3. 維持長期統治</strong></p>
             <ul>
             <li>顧慮子孫（如明惠帝<strong>朱允炆</strong>）未必能駕馭群臣</li>
             <li>故掃清障礙，集權中央，確保朱家江山永固</li>
             </ul>
             </div>`,

            // 2. 废除中书省与宰相制度
            `<div class="section-label">── 二、中央政治措施 ──</div>
             <div class="item-title">1. 廢除中書省與宰相制度</div>
             <div class="content">
             <p><strong>背景</strong></p>
             <ul>
             <li>太祖一直想削減宰相權力</li>
             <li><strong>占城國入貢事件：</strong>占城國使者來朝貢，<strong>胡惟庸</strong>未報告太祖便自行處理，太祖認為宰相瞞著他理事，心生不滿</li>
             <li>胡惟庸曾毒死<strong>劉基</strong>（劉伯溫），太祖後來將此列為罪狀之一</li>
             </ul>
             <p><strong>經過</strong></p>
             <ul>
             <li><strong>洪武十三年</strong>，太祖借胡惟庸案發難</li>
             <li>罪名包括：毒殺劉基、勾結日本與蒙古、圖謀不軌</li>
             <li>誅殺左丞相胡惟庸</li>
             </ul>
             <p><strong>結果</strong></p>
             <ul>
             <li>廢除中書省及丞相一職</li>
             <li><strong>六部直接由皇帝管轄</strong></li>
             <li>皇帝親理國政，不再設宰相</li>
             </ul>
             </div>`,

            // 3. 提高六部地位
            `<div class="item-title">2. 提高六部地位</div>
             <div class="content">
             <ul>
             <li>六部長官由<strong>正三品升為正二品</strong></li>
             <li>六部<strong>互不統屬</strong>，直接向皇帝負責</li>
             <li>六部成為中央政府最高行政機關</li>
             </ul>
             </div>`,

            // 4. 设立四辅官、殿阁大学士
            `<div class="item-title">3. 設立四輔官、殿閣大學士</div>
             <div class="content">
             <p><strong>背景</strong></p>
             <ul><li>廢相後政務繁忙，太祖曾<strong>8日批閱奏章1600餘件，處理政事3000多件</strong></li></ul>
             <p><strong>內容</strong></p>
             <ul>
             <li>設<strong>四輔官</strong>（正三品）及<strong>殿閣大學士</strong>（正五品）</li>
             <li>僅作諮詢顧問，<strong>無實際決策權</strong>，直接對皇帝負責</li>
             </ul>
             </div>`,

            // 5. 设通政使司
            `<div class="item-title">4. 設通政使司</div>
             <div class="content">
             <p><strong>背景：</strong>廢除中書省後，希望更直接管控全國奏章</p>
             <p><strong>職責</strong></p>
             <ul>
             <li>掌理內外奏疏（內：中央官員；外：地方官員）</li>
             <li>上奏臣民言論、控訴議政等事</li>
             </ul>
             <p><strong>成效：</strong>確保全國信息直達皇帝，通達下情</p>
             </div>`,

            // 6. 设三法司
            `<div class="item-title">5. 設三法司</div>
             <div class="content">
             <ul>
             <li><strong>刑部</strong>審理，<strong>大理寺</strong>復核，<strong>都察院</strong>監察</li>

             <p><strong>成效：</strong>三法司互相牽制，司法權歸於天子</p>
             </div>`,

            // 7. 中央都察院 + 十三道监察御史
            `<div class="section-label">── 三、監視大臣方面 ──</div>
             <div class="item-title">1. 中央都察院</div>
             <div class="content">
             <ul>

             </ul>
             </div>`,

            // 8. 六科给事中 + 巡按御史

             <div class="content">
             <ul>
             <li>對應六部，每科設給事中</li>

             <li><strong>職位低但權責重</strong>，防止六部越權</li>
             </ul>
             </div>
             <div class="item-title" style="margin-top:16px">4. 巡按御史</div>
             <div class="content">
             <ul><li>糾察地方吏治，巡察地方政務執行情況</li></ul>
             </div>`,

            // 9. 设立锦衣卫
            `<div class="item-title">5. 設立錦衣衛</div>
             <div class="content">
             <ul>
             <li>原為皇帝私人親軍，執掌儀仗，負責保衛皇宮</li>
             <li>職能：<strong>偵緝監控臣民言行</strong>，有逮捕叛逆之權</li>
             <li>可直接逮捕、審訊、用刑，<strong>不受一般司法程序約束</strong></li>
             <li><strong>南鎮撫司</strong>負責錦衣衛內部法紀，<strong>北鎮撫司</strong>審理皇帝欽定案件，設有專門監獄和法庭</li>
             <li>例子：偵辦藍玉案時，非法凌虐，株連誅殺極多</li>
             <li>洪武二十年，太祖以錦衣衛多非法凌虐為由，<strong>焚毀刑具</strong>，命重歸三法司審理案件</li>
             </ul>
             </div>`,

            // 10. 发动四大案
            `<div class="section-label">── 四、凌辱大臣方面 ──</div>
             <div class="item-title">1. 發動四大案</div>
             <div class="content">
             <p><strong>背景：</strong>因朱允炆仁弱，太祖慮其無法駕馭群臣，故大開殺戒</p>
             <ul>
             <li><strong>胡惟庸案：</strong>以謀反罪誅殺左丞相胡惟庸，牽連被殺者約<strong>三萬餘人</strong></li>
             <li><strong>藍玉案：</strong>以謀反罪誅殺涼國公藍玉，牽連被殺者約<strong>一萬五千人</strong></li>
             <li><strong>空印案</strong>與<strong>郭桓案</strong></li>
             </ul>
             <p>四案合稱<strong>「洪武四大案」</strong>，前後剷除人數達<strong>四萬餘人</strong>，幾乎將開國元勳及能幹官員誅殺殆盡</p>
             </div>`,

            // 11. 修订法律与整肃吏治
            `<div class="item-title">2. 修訂法律與整肅吏治</div>
             <div class="content">
             <ul>
             <li>在前朝律法基礎上制定<strong>《大明律》</strong></li>
             <li>針對貪官污吏，頒布<strong>《大誥》</strong>，根據案例編成，極盡嚴酷</li>
             <li>規定官員貪污滿<strong>60兩白銀</strong>，處以<strong>剝皮實草</strong>之刑</li>
             <li>貪贓60兩以上，<strong>梟首示眾</strong></li>
             <li>若涉謀反，處以<strong>凌遲、族誅</strong>等酷刑</li>
             </ul>
             <p>政風因而為之肅然，但也使人人自危</p>
             </div>`,

            // 12. 钳制士人
            `<div class="item-title">3. 鉗制士人</div>
             <div class="content">
             <p><strong>八股取士</strong></p>
             <ul>
             <li>科舉考試限定以<strong>四書五經</strong>為題</li>
             <li>須按<strong>八股文格式</strong>作答，不許發揮己見</li>
             <li>使士風趨於守舊</li>
             </ul>
             <p><strong>文字獄</strong></p>
             <ul>
             <li>藉口官員奏章字眼含諷刺意味，大興文字獄</li>
             <li>例子：「<strong>生</strong>」與「僧」同音，暗指太祖曾為僧；「<strong>光</strong>」字聯想禿頭，亦犯忌諱</li>
             <li>因此處死士人</li>
             </ul>
             </div>`,

            // 13. 折辱大臣
            `<div class="item-title">4. 折辱大臣</div>
             <div class="content">
             <p><strong>背景：</strong>為提升君主權威，對大臣極盡折辱</p>
             <ul>
             <li>宋代以前，大臣可<strong>坐</strong>而論道</li>
             <li>宋代改為<strong>站立</strong>議事</li>
             <li>明太祖更降為<strong>跪地奏事</strong>，徹底減殺大臣尊嚴</li>
             </ul>
             <p><strong>廷杖</strong></p>
             <ul>
             <li>奏對不合意者，當廷施以廷杖</li>
             <li>每次打<strong>八十棍</strong>，每<strong>五棍換一人</strong></li>
             <li>不少大臣被當場杖死</li>
             </ul>
             <p>京官每旦入朝，必與妻子訣別，朝不保夕。政風因循苟且，朝臣但求明哲保身</p>

            // 14. 复行封建，分封藩王
            `<div class="section-label">── 五、地方政策方面 ──</div>
             <div class="item-title">1. 復行封建，分封藩王</div>
             <div class="content">
             <p><strong>背景</strong></p>
             <ul>
             <li>太祖有見宋、元皇室孤立而亡，無分封</li>
             <li>需防禦北方蒙古勢力，防邊族入侵</li>
             </ul>
             <p><strong>措施</strong></p>
             <ul>
             <li>將<strong>24名兒子及1名侄孫</strong>分封至各地都城及邊疆重鎮</li>
             <li>例子：封<strong>燕王朱棣</strong>於北平，<strong>寧王朱權</strong>於大寧</li>
             <li>規定諸王可擁有<strong>三千至數萬人</strong>軍隊</li>
             <li>遇朝廷有事，便可<strong>勤王</strong></li>
             </ul>
             </div>`,

            // 15. 设三司制
            `<div class="item-title">2. 設三司制</div>
             <div class="content">
             <p><strong>背景：</strong>元代行省總領軍、民、財政，權力過大</p>
             <p><strong>措施</strong></p>
             <ul>
             <li>改行省為<strong>承宣布政使司</strong>，掌一省民政、財政</li>
             <li>設<strong>提刑按察使司</strong>，掌一省之刑獄</li>
             <li>設<strong>都指揮使司</strong>，掌一省之軍事</li>
             </ul>
             <p>三司<strong>互不統屬</strong>，各自直屬中央，地方政權一分為三</p>
             </div>`,

            // 16. 行里甲制
            `<div class="item-title">3. 行里甲制</div>
             <div class="content">
             <p><strong>背景：</strong>為加強對社會的控制與監控</p>
             <p><strong>措施</strong></p>
             <ul>
             <li>以<strong>110戶為一里</strong>，推糧多者為<strong>里長</strong></li>
             <li>每<strong>10戶為一甲</strong>，長官為<strong>甲首</strong></li>
             </ul>
             <p><strong>職能：</strong>協助官府管理地方土地、戶口與徵稅，並協助地方治安</p>
             </div>`,

            // 17. 设五军都督府
            `<div class="section-label">── 六、軍事方面 ──</div>
             <div class="item-title">1. 設五軍都督府</div>
             <div class="content">
             <p><strong>背景</strong></p>
             <ul>
             <li>明初置樞密院掌理中外軍事，後改為<strong>大都督府</strong>，統領全國軍事</li>
             <li>太祖認為大都督府權力過大，將其分為<strong>左、右、前、後、中</strong>五軍都督府</li>
             </ul>
             <p><strong>與兵部相互制衡</strong></p>
             <ul>
             <li><strong>兵部：</strong>有調兵權，無統兵權</li>
             <li><strong>五軍都督府：</strong>有統兵權，無調兵權</li>
             </ul>
             <p><strong>成效：</strong>兩者互相牽制，不能專兵，軍權牢牢掌握在皇帝手中</p>
             </div>`,

            // 18. 推行卫所制
            `<div class="item-title">2. 推行衛所制</div>
             <div class="content">
             <ul>
             <li>太祖實行衛所制度</li>
             <li>平時軍人<strong>屯田</strong>，自給自足；戰時則應徵打仗</li>
             <li>太祖曾言<strong>「吾養兵百萬，不費百姓一粒米」</strong></li>
             </ul>
             <p><strong>成效：</strong>兵農合一，節省軍費</p>
             </div>`
        ];

        let currentPage = 0;
        const totalPages = pages.length;

        function renderPage() {
            document.getElementById('page-content').innerHTML = pages[currentPage];
            document.getElementById('page-indicator').textContent = (currentPage + 1) + ' / ' + totalPages;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = currentPage === totalPages - 1;
            const dots = document.getElementById('nav-dots');
            dots.innerHTML = '';
            for (let i = 0; i < totalPages; i++) {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (i === currentPage ? ' active' : '');
                dot.onclick = () => { currentPage = i;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' }); };
                dots.appendChild(dot);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextPage() { if (currentPage < totalPages - 1) { currentPage++;
                renderPage(); } }
        function prevPage() { if (currentPage > 0) { currentPage--;
                renderPage(); } }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; });
        document.addEventListener('touchend', function(e) {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) { if (diff > 0) nextPage();
                else prevPage(); }
        });

        renderPage();
    </script>
</body>
</html>
