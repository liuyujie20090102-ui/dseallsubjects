<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中史 · DSE 學習站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ed;
            --text-primary: #2c2416;
            --text-secondary: #5c5347;
            --text-muted: #a09880;
            --ink-light: rgba(60,40,20,0.06);
            --mountain-far: rgba(120,100,70,0.12);
            --mountain-mid: rgba(100,80,55,0.16);
            --mountain-near: rgba(80,60,40,0.2);
            --cloud: rgba(255,252,245,0.7);
            --card-bg: rgba(255,253,248,0.75);
            --card-border: rgba(180,160,130,0.3);
            --shadow-sm: 0 2px 16px rgba(60,40,20,0.04);
            --shadow-md: 0 8px 32px rgba(60,40,20,0.06);
            --radius: 16px;
            --font-cn: "Noto Serif TC","PingFang SC","Microsoft YaHei","KaiTi",serif;
            --font-en: "Inter","Helvetica Neue",sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{
            background-color:var(--bg);
            font-family:var(--font-cn);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:40px 24px 60px;
            position:relative;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }
        body::before{
            content:"";
            position:fixed;top:0;left:0;
            width:100%;height:100%;
            pointer-events:none;z-index:0;
            background-image:
                repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(139,119,80,0.015) 3px,rgba(139,119,80,0.015) 4px),
                repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(139,119,80,0.01) 5px,rgba(139,119,80,0.01) 6px);
            opacity:0.8;
        }
        .mountains{position:fixed;bottom:0;left:0;width:100%;height:35%;pointer-events:none;z-index:0}
        .mountain{position:absolute;bottom:0}
        .mountain.m1{left:-10%;width:50%;height:60%;background:var(--mountain-far);border-radius:60% 60% 0 0}
        .mountain.m2{left:20%;width:55%;height:75%;background:var(--mountain-mid);border-radius:55% 50% 0 0}
        .mountain.m3{left:45%;width:50%;height:55%;background:var(--mountain-far);border-radius:50% 60% 0 0}
        .mountain.m4{right:-10%;width:45%;height:70%;background:var(--mountain-near);border-radius:55% 55% 0 0}
        .clouds{position:fixed;bottom:15%;left:0;width:100%;height:20%;pointer-events:none;z-index:0}
        .cloud{position:absolute;background:var(--cloud);border-radius:50%;filter:blur(30px)}
        .cloud.c1{width:300px;height:60px;left:10%;bottom:40px;opacity:0.6}
        .cloud.c2{width:250px;height:50px;right:15%;bottom:20px;opacity:0.5}
        .cloud.c3{width:200px;height:40px;left:50%;bottom:10px;opacity:0.4;transform:translateX(-50%)}
        .cloud.c4{width:350px;height:55px;left:30%;bottom:55px;opacity:0.45}
        .birds{position:fixed;top:15%;right:15%;pointer-events:none;z-index:0;opacity:0.35}
        .bird{display:inline-block;font-size:14px;margin:0 6px;animation:birdFloat 6s ease-in-out infinite}
        .bird:nth-child(2){animation-delay:1.5s;font-size:10px}
        .bird:nth-child(3){animation-delay:3s;font-size:12px}
        @keyframes birdFloat{
            0%,100%{transform:translateY(0) translateX(0)}
            25%{transform:translateY(-8px) translateX(4px)}
            50%{transform:translateY(-3px) translateX(10px)}
            75%{transform:translateY(-10px) translateX(3px)}
        }
        .container{position:relative;z-index:1;width:100%;max-width:600px}
        #top{position:absolute;top:0}
        .back-link{display:inline-block;color:var(--text-muted);text-decoration:none;font-size:14px;margin-bottom:32px;letter-spacing:1px;transition:color 0.3s}
        .back-link:hover{color:var(--text-primary)}
        .page-title{text-align:center;font-size:32px;font-weight:700;color:var(--text-primary);letter-spacing:4px;margin-bottom:48px}
        .page-title .icon{display:block;font-size:40px;margin-bottom:10px}
        .section{margin-bottom:40px;scroll-margin-top:40px}
        .section-header{text-align:center;margin-bottom:24px}
        .section-header .section-title{font-size:18px;font-weight:600;color:var(--text-muted);letter-spacing:3px}
        .timeline{position:relative;padding-left:40px}
        .timeline::before{content:"";position:absolute;left:16px;top:0;bottom:0;width:2px;background:var(--ink-light)}
        .timeline-item{position:relative;padding:12px 0 12px 24px;font-size:17px;color:var(--text-secondary);letter-spacing:2px}
        .timeline-item::before{content:"";position:absolute;left:-28px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:var(--text-muted)}
        .timeline-item a{color:var(--text-secondary);text-decoration:none;transition:color 0.3s}
        .timeline-item a:hover{color:#8b6914}
        .placeholder{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:15px;letter-spacing:2px}
        .footer{text-align:center;font-family:var(--font-en);font-size:11px;color:var(--text-muted);letter-spacing:2px;padding-top:20px}
        .footer .name{font-weight:500;color:var(--text-secondary)}
        @media(max-width:480px){
            .page-title{font-size:26px}
            .timeline{padding-left:30px}
            .timeline::before{left:10px}
            .timeline-item{font-size:15px;padding-left:18px}
            .timeline-item::before{left:-22px;width:8px;height:8px}
        }
    </style>
</head>
<body>

    <div class="mountains">
        <div class="mountain m1"></div>
        <div class="mountain m2"></div>
        <div class="mountain m3"></div>
        <div class="mountain m4"></div>
    </div>
    <div class="clouds">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
        <div class="cloud c4"></div>
    </div>
    <div class="birds">
        <span class="bird">⩳</span>
        <span class="bird">⩳</span>
        <span class="bird">⩳</span>
    </div>

    <div class="container">
        <div id="top"></div>
        <a href="index.html" class="back-link">← 返回主頁</a>
        <div class="page-title">
            <span class="icon">🏯</span>
            中 史
        </div>
        <div class="section" id="gudaishi">
            <div class="section-header"><span class="section-title">── 古代史 ──</span></div>
            <div class="timeline">
                <div class="timeline-item">周朝</div>
                <div class="timeline-item">秦朝</div>
                <div class="timeline-item">漢朝</div>
                <div class="timeline-item">隋朝</div>
                <div class="timeline-item"><a href="唐朝/1.html">唐朝</a></div>
                <div class="timeline-item"><a href="宋朝/1.html">宋朝</a></div>
                <div class="timeline-item">元朝</div>
                <div class="timeline-item"><a href="明朝/1.html">明朝</a></div>
                <div class="timeline-item">清朝</div>
            </div>
        </div>
        <div class="section" id="jindaishi">
            <div class="section-header"><span class="section-title">── 近代史 ──</span></div>
            <div class="placeholder">內容待建</div>
        </div>
        <div class="footer">── <span class="name">Shelly Liu</span> ──</div>
    </div>

</body>
</html>
