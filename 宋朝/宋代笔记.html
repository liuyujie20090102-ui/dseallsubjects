<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宋代 · 筆記</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ed;
            --text-primary: #2c2416;
            --text-secondary: #5c5347;
            --text-muted: #a09880;
            --gold: #8b6914;
            --gold-light: #c4a97d;
            --ink-light: rgba(60,40,20,0.06);
            --mountain-far: rgba(120,100,70,0.12);
            --mountain-mid: rgba(100,80,55,0.16);
            --mountain-near: rgba(80,60,40,0.2);
            --cloud: rgba(255,252,245,0.7);
            --card-bg: rgba(255,253,248,0.8);
            --font-cn: "Noto Serif TC","PingFang SC","Microsoft YaHei","KaiTi",serif;
            --font-en: "Inter","Helvetica Neue",sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background-color:var(--bg);
            font-family:var(--font-cn);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:32px 20px 80px;
            position:relative;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }
        body::before{
            content:"";
            position:fixed;top:0;left:0;
            width:100%;height:100%;
            pointer-events:none;z-index:0;
            background-image:
                repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(139,119,80,0.012) 3px,rgba(139,119,80,0.012) 4px),
                repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(139,119,80,0.008) 5px,rgba(139,119,80,0.008) 6px);
            opacity:0.7;
        }
        .mountains{position:fixed;bottom:0;left:0;width:100%;height:30%;pointer-events:none;z-index:0}
        .mountain{position:absolute;bottom:0}
        .mountain.m1{left:-8%;width:45%;height:55%;background:var(--mountain-far);border-radius:55% 55% 0 0}
        .mountain.m2{left:22%;width:50%;height:68%;background:var(--mountain-mid);border-radius:50% 48% 0 0}
        .mountain.m3{right:-8%;width:42%;height:60%;background:var(--mountain-near);border-radius:52% 52% 0 0}
        .clouds{position:fixed;bottom:12%;left:0;width:100%;height:18%;pointer-events:none;z-index:0}
        .cloud{position:absolute;background:var(--cloud);border-radius:50%;filter:blur(28px)}
        .cloud.c1{width:260px;height:50px;left:8%;bottom:30px;opacity:0.5}
        .cloud.c2{width:220px;height:42px;right:12%;bottom:15px;opacity:0.4}
        .cloud.c3{width:180px;height:35px;left:50%;bottom:8px;opacity:0.35;transform:translateX(-50%)}
        .birds{position:fixed;top:12%;right:12%;pointer-events:none;z-index:0;opacity:0.3}
        .bird{display:inline-block;font-size:13px;margin:0 5px;animation:birdFloat 6s ease-in-out infinite}
        .bird:nth-child(2){animation-delay:1.5s;font-size:9px}
        .bird:nth-child(3){animation-delay:3s;font-size:11px}
        @keyframes birdFloat{
            0%,100%{transform:translateY(0) translateX(0)}
            25%{transform:translateY(-7px) translateX(3px)}
            50%{transform:translateY(-2px) translateX(8px)}
            75%{transform:translateY(-9px) translateX(3px)}
        }

        .container{position:relative;z-index:1;width:100%;max-width:650px}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
        .back-link{color:var(--text-muted);text-decoration:none;font-size:14px;letter-spacing:1px;transition:color 0.3s}
        .back-link:hover{color:var(--text-primary)}
        .page-indicator{font-family:var(--font-en);font-size:13px;color:var(--text-muted);letter-spacing:1px}

        .page-card{
            background:var(--card-bg);
            backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
            border:1px solid rgba(180,160,130,0.2);
            border-radius:16px;
            padding:40px 32px;
            box-shadow:0 2px 20px rgba(60,40,20,0.04);
        }

        .note-title{text-align:center;font-size:24px;font-weight:700;color:var(--text-primary);letter-spacing:3px;margin-bottom:28px}
        .section-label{text-align:center;font-size:16px;font-weight:600;color:var(--text-muted);letter-spacing:3px;margin-bottom:24px}
        .section-label-sub{text-align:center;font-size:14px;font-weight:600;color:var(--text-muted);letter-spacing:2px;margin-bottom:18px}
        .item-title{font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:16px;letter-spacing:1px;padding-bottom:8px;border-bottom:1px solid var(--ink-light)}
        .content{font-size:16px;color:var(--text-secondary);line-height:2.2;letter-spacing:0.5px}
        .content p{margin-bottom:10px}
        .content ul{list-style:none;padding-left:0;margin-bottom:14px}
        .content ul li{padding:5px 0 5px 20px;position:relative;line-height:2.1}
        .content ul li::before{content:"·";position:absolute;left:4px;color:var(--gold-light);font-weight:bold;font-size:18px}
        .content ul li.sub{padding-left:36px}
        .content ul li.sub::before{content:"·";left:18px;color:var(--text-muted);font-size:14px}
        .content ul li.sub2{padding-left:48px}
        .content ul li.sub2::before{content:"·";left:32px;color:var(--text-muted);font-size:12px}
        .content strong{color:var(--text-primary);font-weight:600}
        .content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px}
        .content table th{background:rgba(180,160,130,0.15);color:var(--text-primary);padding:10px 12px;text-align:center;font-weight:600;border:1px solid rgba(180,160,130,0.2)}
        .content table td{padding:9px 12px;border:1px solid rgba(180,160,130,0.2);color:var(--text-secondary);line-height:1.7}
        .content table td:first-child{font-weight:600;color:var(--text-primary);text-align:center;background:rgba(180,160,130,0.05)}
        .content img{width:100%;max-width:500px;display:block;margin:20px auto;border-radius:12px;border:1px solid rgba(180,160,130,0.2);background:rgba(255,253,248,0.5);padding:12px}

        .nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:12px}
        .nav-btn{padding:10px 22px;background:rgba(255,253,248,0.7);border:1px solid rgba(180,160,130,0.25);border-radius:20px;cursor:pointer;font-family:var(--font-cn);font-size:14px;color:var(--text-secondary);letter-spacing:1px;transition:all 0.3s}
        .nav-btn:hover{background:rgba(180,160,130,0.12);color:var(--text-primary)}
        .nav-btn:disabled{opacity:0.3;cursor:default;pointer-events:none}

        .toc-btn{position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:rgba(255,253,248,0.85);border:1px solid rgba(180,160,130,0.3);box-shadow:0 2px 16px rgba(60,40,20,0.1);cursor:pointer;z-index:20;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all 0.3s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
        .toc-btn:hover{background:rgba(255,253,248,1);box-shadow:0 4px 24px rgba(60,40,20,0.15)}
        .toc-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:30;justify-content:center;align-items:flex-end}
        .toc-overlay.show{display:flex}
        .toc-panel{background:#fffdf7;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:60vh;overflow-y:auto;padding:20px 24px 32px;box-shadow:0 -4px 24px rgba(0,0,0,0.1);animation:slideUp 0.3s ease;position:relative}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .toc-panel .toc-header{display:flex;justify-content:center;margin-bottom:6px}
        .toc-panel .toc-handle{width:40px;height:4px;border-radius:2px;background:var(--text-muted);opacity:0.4}
        .toc-panel .toc-title{text-align:center;font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:2px;margin:12px 0 16px}
        .toc-item{display:block;padding:7px 8px;font-size:14px;color:var(--text-secondary);text-decoration:none;border-radius:6px;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;line-height:1.8}
        .toc-item:hover{background:rgba(180,160,130,0.1);color:var(--text-primary)}
        .toc-item.active{background:rgba(139,105,20,0.1);color:var(--gold);font-weight:600}
        .toc-item.toc-l1{font-weight:600;color:var(--text-primary);margin-top:8px;font-size:15px}
        .toc-item.toc-l2{padding-left:20px}
        .toc-item.toc-l3{padding-left:36px;font-size:13px}
        .toc-item.toc-appendix{padding-left:20px;font-style:italic;color:var(--text-muted)}

        .footer{text-align:center;font-family:var(--font-en);font-size:11px;color:var(--text-muted);letter-spacing:2px;padding-top:24px}

        @media(max-width:480px){
            .page-card{padding:24px 16px}
            .item-title{font-size:16px}
            .content{font-size:15px}
            .content table{font-size:12px}
            .nav-btn{padding:8px 14px;font-size:13px}
            .toc-btn{bottom:16px;right:16px;width:42px;height:42px;font-size:20px}
            .toc-panel{max-height:55vh;padding:16px 18px 24px}
        }
    </style>
</head>
<body>

    <div class="mountains">
        <div class="mountain m1"></div>
        <div class="mountain m2"></div>
        <div class="mountain m3"></div>
    </div>
    <div class="clouds">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>
    <div class="birds">
        <span class="bird">⩳</span>
        <span class="bird">⩳</span>
        <span class="bird">⩳</span>
    </div>

    <div class="container">
        <div class="top-bar">
            <a href="1.html" class="back-link">← 返回宋朝</a>
            <span class="page-indicator" id="page-indicator">1 / 21</span>
        </div>
        <div class="page-card"><div id="page-content"></div></div>
        <div class="nav-bar">
            <button class="nav-btn" id="prev-btn" onclick="prevPage()">← 上一頁</button>
            <button class="nav-btn" id="next-btn" onclick="nextPage()">下一頁 →</button>
        </div>
        <div class="footer">── Shelly Liu ──</div>
    </div>

    <div class="toc-btn" onclick="openToc()">📂</div>
    <div class="toc-overlay" id="toc-overlay" onclick="closeToc(event)">
        <div class="toc-panel" id="toc-panel" onclick="event.stopPropagation()">
            <div class="toc-header"><div class="toc-handle"></div></div>
            <div class="toc-title">── 目錄 ──</div>
            <div id="toc-content"></div>
        </div>
    </div>

    <script>
        const pages = [
            // 1. 鉴前朝之失
            `<div class="note-title">🏯 宋代中央集權</div>
             <div class="section-label">── 一、中央集權原因 ──</div>
             <div class="item-title">鑑前朝之失，維護國祚</div>
             <div class="content">
             <ul>
             <li>汲取唐末五代以來<strong>「藩鎮割據」、「君弱臣強」</strong>的教訓，想政權穩定</li>
             </ul>
             </div>`,

            // 2. 防止兵变
            `<div class="item-title">防止兵變</div>
             <div class="content">
             <ul>
             <li>宋太祖經<strong>「陳橋兵變」</strong>得位，深恐部下效仿</li>
             <li>五代時期「黃袍加身」屢見不鮮，太祖欲打破武人/節度使奪權的循環</li>
             <li>例子：<strong>石敬瑭</strong>割讓燕雲十六州予契丹；五代十國君主得位不正</li>
             </ul>
             </div>`,

            // 3. 加强监察
            `<div class="section-label">── 二、如何收中央相權？──</div>
             <div class="content"><p>宋宰相：<strong>趙普</strong>，核心方針：司權分立，達至加強皇權、削弱相權之效</p></div>
             <div class="item-title" style="margin-top:20px">加強監察</div>
             <div class="content">
             <ul>
             <li>設<strong>諫院與御史台</strong>，直接對皇帝負責</li>
             <li>不再諫君，改為諫宰相及官員，合稱<strong>台諫</strong></li>
             <li>宋朝重文，不殺言官，助長彈劾風氣</li>
             </ul>
             </div>`,

            // 4. 站对议事
            `<div class="item-title">站對議事</div>
             <div class="content">
             <ul>
             <li>宋代宰相奏議政務，需要<strong>「站對」</strong></li>
             <li>宋朝以前宰相見君主是「坐而論道」</li>
             </ul>
             </div>`,

            // 5. 分割相权·行政
            `<div class="item-title">分割相權 · 行政</div>
             <div class="content">
             <table>
             <tr><th>方面</th><th>內容</th><th>目的</th></tr>
             <tr><td><strong>行政</strong></td><td>中書省為宰相機關；「同中書門下平章事」為丞相，僅負責行政事務；「參知政事」為副相，牽制宰相</td><td>削減相權，牽制宰相</td></tr>
             </table>
             </div>`,

            // 6. 分割相权·军事
            `<div class="item-title">分割相權 · 軍事</div>
             <div class="content">
             <table>
             <tr><th>方面</th><th>內容</th><th>目的</th></tr>
             <tr><td><strong>軍事</strong></td><td>樞密院管軍政，與中書省合稱「二府」，掌調發權；三衙掌管理與訓練權，互相牽制，兵權分離</td><td>以文制武，防止武人擅權</td></tr>
             </table>
             </div>`,

            // 7. 分割相权·财政
            `<div class="item-title">分割相權 · 財政</div>
             <div class="content">
             <table>
             <tr><th>方面</th><th>內容</th><th>目的</th></tr>
             <tr><td><strong>財政</strong></td><td>設三司（鹽鐵、度支、戶部），長官為三司使，號稱計相，與二府合稱「二府三司」</td><td>分割宰相財政權</td></tr>
             </table>
             </div>`,

            // 8. 分割相权·用人+司法
            `<div class="item-title">分割相權 · 用人 + 司法</div>
             <div class="content">
             <table>
             <tr><th>方面</th><th>內容</th><th>目的</th></tr>
             <tr><td><strong>用人權</strong></td><td>審官院考核京官；考課院考核地方官；三班院管低級武職</td><td>侵奪宰相選官的權力</td></tr>
             <tr><td><strong>司法權</strong></td><td>設審刑院，不受宰相統領，直接向君主負責</td><td>削減/架空宰相的司法管理權</td></tr>
             </table>
             <p>將宰相權力一分為三（行政、軍事、財政），亦分割用人權與司法權</p>
             </div>`,

            // 9. 附：二府三司制
            `<div class="item-title">附：宋代二府三司制</div>
             <div class="content">
             <img src="erfu.png" alt="宋代二府三司制">
             <table>
             <tr><th>機構</th><th>職能</th></tr>
             <tr><td>皇帝</td><td>最高統治權，直接控制和擬定決策</td></tr>
             <tr><td>中書省（行政）</td><td>提出行政提議，下令六部執行</td></tr>
             <tr><td>樞密院（軍事）</td><td>掌調發權</td></tr>
             <tr><td>三司（財政）</td><td>鹽鐵、度支、戶部</td></tr>
             <tr><td>御史台 / 諫院</td><td>監察百官，獨立於行政、軍事、財政之外</td></tr>
             </table>
             <p>中書省與樞密院合稱<strong>「二府」</strong>，與三司合稱<strong>「二府三司」</strong></p>
             <p>三衙（殿前司、馬軍司、步軍司）掌禁軍管理與訓練權，與樞密院互相牽制</p>
             </div>`,

            // 10. 杯酒释兵权
            `<div class="section-label">── 三、如何收地方權力？──</div>
             <div class="content"><p>核心方針：<strong>稍奪其權，收其精兵，制其錢谷</strong></p></div>
             <div class="section-label-sub" style="margin-top:16px">收其精兵</div>
             <div class="item-title">杯酒釋兵權</div>
             <div class="content">
             <ul>
             <li><strong>罷免李重進：</strong>宋太祖初即位，罷免禁軍首領李重進「殿前都點檢」一職，交由其弟趙匡義統領</li>
             <li><strong>解除宿將兵權：</strong>勸服禁軍宿將交出兵權，解除<strong>石守信、王審琦、高懷德</strong>等禁軍高級將領的兵權</li>
             </ul>
             </div>`,

            // 11. 分割禁军
            `<div class="item-title">分割禁軍</div>
             <div class="content">
             <ul>
             <li>宋太祖廢除殿前司長官<strong>「都點檢」</strong>一職，改以都指揮使為長官，降低殿前司地位</li>
             <li>都指揮使資歷低、威望低、易駕馭</li>
             </ul>
             <p>→ 一舉奪回中央軍權</p>
             </div>`,

            // 12. 三衙
            `<div class="item-title">三衙</div>
             <div class="content">
             <ul>
             <li>分侍衛司為<strong>侍衛馬軍司</strong>及<strong>侍衛步軍司</strong>，與殿前司負責禁軍日常管理和訓練</li>
             <li>遇戰事時，由皇帝經樞密院頒發虎符，臨時派將帥統兵出征</li>
             <li>戰事結束，兵歸三衙，將領回朝</li>
             </ul>
             <p><strong>好處</strong></p>
             <ul>
             <li>分散禁軍權力，統兵權和調兵權分開</li>
             <li>兵將分離，無法私自出兵</li>
             <li>兩者互相牽制</li>
             </ul>
             </div>`,

            // 13. 禁军与厢军
            `<div class="item-title">禁軍與廂軍</div>
             <div class="content">
             <table>
             <tr><th></th><th>禁軍</th><th>廂軍</th></tr>
             <tr><td>兵力</td><td>約18萬</td><td>約19萬</td></tr>
             <tr><td>素質</td><td>精銳壯卒</td><td>老弱士兵</td></tr>
             <tr><td>駐守</td><td>中央及邊境重地</td><td>地方</td></tr>
             </table>
             <p>共約38萬兵力。宋朝無退役制度，造成冗軍</p>
             </div>`,

            // 14. 更戍法
            `<div class="item-title">更戍法</div>
             <div class="content">
             <ul>
             <li>禁軍每三年調換防區，將領不需易防</li>
             <li><strong>兵無常帥，帥無常師 / 兵不專將，將不專兵</strong></li>
             <li>→ 避免將領長期統兵、擁兵自重</li>
             </ul>
             <p><strong>壞處</strong></p>
             <ul>
             <li>軍事積弱，力量嚴重下降（將帥與士兵缺乏默契；士兵長途跋涉、水土不服）</li>
             <li>財政負擔增加</li>
             </ul>
             </div>`,

            // 15. 文人掌军事
            `<div class="item-title">文人掌軍事（重文輕武）</div>
             <div class="content">
             <ul>
             <li>宋太祖以文制武，以文官統領樞密院及地方軍事，防止武人擅權</li>
             <li>例子：宰相<strong>趙普</strong>雖是文官，但曾領兵防禦西夏，是文臣知軍事典範</li>
             </ul>
             </div>`,

            // 16. 设转运使
            `<div class="section-label-sub">制其錢谷</div>
             <div class="item-title">設轉運使</div>
             <div class="content">
             <ul>
             <li>為確保地方賦稅能上供中央，朝廷特設轉運使一職，規定各州財務帳籍須按時申報給本路轉運使</li>

        ];

        let currentPage = 0;
        const totalPages = pages.length;

        function renderPage() {
            document.getElementById('page-content').innerHTML = pages[currentPage];
            document.getElementById('page-indicator').textContent = (currentPage + 1) + ' / ' + totalPages;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = currentPage === totalPages - 1;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderToc();
        }

        function renderToc() {
            const tocContent = document.getElementById('toc-content');
            tocContent.innerHTML = '';
            tocItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'toc-item';
                if (item.level === 1) div.classList.add('toc-l1');
                if (item.level === 2) div.classList.add('toc-l2');
                if (item.level === 3) div.classList.add('toc-l3');
                if (item.level === 'appendix') div.classList.add('toc-appendix');
                if (item.page === currentPage) div.classList.add('active');
                div.textContent = item.label;
                div.onclick = () => { currentPage = item.page;
                    renderPage();
                    closeTocDirect(); };
                tocContent.appendChild(div);
            });
        }

        function nextPage() { if (currentPage < totalPages - 1) { currentPage++;
                renderPage(); } }
        function prevPage() { if (currentPage > 0) { currentPage--;
                renderPage(); } }

        function openToc() { document.getElementById('toc-overlay').classList.add('show');
            renderToc(); }
        function closeToc(e) { if (e && e.target !== document.getElementById('toc-overlay')) return;
            document.getElementById('toc-overlay').classList.remove('show'); }
        function closeTocDirect() { document.getElementById('toc-overlay').classList.remove('show'); }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; });
        document.addEventListener('touchend', function(e) {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) { if (diff > 0) nextPage();
                else prevPage(); }
        });

        renderPage();
    </script>
