<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中史 · DSE 學習站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ed;
            --text-primary: #2c2416;
            --text-secondary: #5c5347;
            --text-muted: #a09880;
            --ink-light: rgba(60, 40, 20, 0.06);
            --ink-medium: rgba(60, 40, 20, 0.12);
            --mountain-far: rgba(120, 100, 70, 0.15);
            --mountain-mid: rgba(100, 80, 55, 0.2);
            --mountain-near: rgba(80, 60, 40, 0.25);
            --cloud: rgba(255, 252, 245, 0.7);
            --card-bg: rgba(255, 253, 248, 0.75);
            --card-border: rgba(180, 160, 130, 0.3);
            --shadow-sm: 0 2px 16px rgba(60, 40, 20, 0.04);
            --shadow-md: 0 8px 32px rgba(60, 40, 20, 0.06);
            --radius: 16px;
            --font-cn: "Noto Serif TC", "PingFang SC", "Microsoft YaHei", "KaiTi", serif;
            --font-en: "Inter", "Helvetica Neue", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            font-family: var(--font-cn);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px 60px;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 宣纸纹理 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(139, 119, 80, 0.015) 3px, rgba(139, 119, 80, 0.015) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 5px, rgba(139, 119, 80, 0.01) 5px, rgba(139, 119, 80, 0.01) 6px);
            opacity: 0.8;
        }

        /* 远山 */
        .mountains {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%;
            pointer-events: none;
            z-index: 0;
        }
        .mountain {
            position: absolute;
            bottom: 0;
        }
        .mountain.m1 {
            left: -10%;
            width: 50%;
            height: 60%;
            background: var(--mountain-far);
            border-radius: 60% 60% 0 0;
        }
        .mountain.m2 {
            left: 20%;
            width: 55%;
            height: 75%;
            background: var(--mountain-mid);
            border-radius: 55% 50% 0 0;
        }
        .mountain.m3 {
            left: 45%;
            width: 50%;
            height: 55%;
            background: var(--mountain-far);
            border-radius: 50% 60% 0 0;
        }
        .mountain.m4 {
            right: -10%;
            width: 45%;
            height: 70%;
            background: var(--mountain-near);
            border-radius: 55% 55% 0 0;
        }

        /* 云雾 */
        .clouds {
            position: fixed;
            bottom: 15%;
            left: 0;
            width: 100%;
            height: 20%;
            pointer-events: none;
            z-index: 0;
        }
        .cloud {
            position: absolute;
            background: var(--cloud);
            border-radius: 50%;
            filter: blur(30px);
        }
        .cloud.c1 {
            width: 300px;
            height: 60px;
            left: 10%;
            bottom: 40px;
            opacity: 0.6;
        }
        .cloud.c2 {
            width: 250px;
            height: 50px;
            right: 15%;
            bottom: 20px;
            opacity: 0.5;
        }
        .cloud.c3 {
            width: 200px;
            height: 40px;
            left: 50%;
            bottom: 10px;
            opacity: 0.4;
            transform: translateX(-50%);
        }
        .cloud.c4 {
            width: 350px;
            height: 55px;
            left: 30%;
            bottom: 55px;
            opacity: 0.45;
        }

        /* 飞鸟 */
        .birds {
            position: fixed;
            top: 15%;
            right: 15%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
        }
        .bird {
            display: inline-block;
            font-size: 14px;
            margin: 0 6px;
            animation: birdFloat 6s ease-in-out infinite;
        }
        .bird:nth-child(2) {
            animation-delay: 1.5s;
            font-size: 10px;
        }
        .bird:nth-child(3) {
            animation-delay: 3s;
            font-size: 12px;
        }
        @keyframes birdFloat {
            0%,
            100% {
                transform: translateY(0) translateX(0);
            }
            25% {
                transform: translateY(-8px) translateX(4px);
            }
            50% {
                transform: translateY(-3px) translateX(10px);
            }
            75% {
                transform: translateY(-10px) translateX(3px);
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
        }

        /* 顶部锚点 */
        #top {
            position: absolute;
            top: 0;
        }

        /* 返回链接 */
        .back-link {
            display: inline-block;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 32px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: var(--text-primary);
        }

        /* 标题 */
        .page-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 4px;
            margin-bottom: 40px;
        }
        .page-title .icon {
            display: block;
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* 分类卡片 */
        .category-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 48px;
        }
        .category-card {
            display: block;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 28px 24px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .category-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }
        .category-card .card-icon {
            font-size: 32px;
            display: block;
            margin-bottom: 8px;
        }
        .category-card .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .category-card .card-desc {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* 区域 */
        .section {
            padding-top: 20px;
            margin-bottom: 48px;
            scroll-margin-top: 40px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--ink-light);
        }
        .section-header .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 3px;
        }
        .section-header .top-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .section-header .top-link:hover {
            color: var(--text-primary);
        }

        /* 时间线 */
        .timeline {
            position: relative;
            padding-left: 40px;
        }
        .timeline::before {
            content: "";
            position: absolute;
            left: 16px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--ink-light);
        }
        .timeline-item {
            position: relative;
            padding: 10px 0 10px 24px;
            margin-bottom: 4px;
            font-size: 17px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            transition: color 0.3s;
        }
        .timeline-item::before {
            content: "";
            position: absolute;
            left: -28px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
        }
        .timeline-item a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }
        .timeline-item a:hover {
            color: #8b6914;
        }
        .timeline-item.active::before {
            background: #8b6914;
            width: 12px;
            height: 12px;
            left: -29px;
            box-shadow: 0 0 8px rgba(139, 105, 20, 0.3);
        }
        .timeline-item.active a {
            color: #6b4e0a;
            font-weight: 600;
            border-bottom: 1px dashed #8b6914;
        }

        /* 待建 */
        .placeholder {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 15px;
            letter-spacing: 2px;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            font-family: var(--font-en);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            padding-top: 20px;
        }
        .footer .name {
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .page-title {
                font-size: 26px;
            }
            .timeline {
                padding-left: 30px;
            }
            .timeline::before {
                left: 10px;
            }
            .timeline-item {
                font-size: 15px;
                padding-left: 18px;
            }
            .timeline-item::before {
                left: -22px;
                width: 8px;
                height: 8px;
            }
            .category-card {
                padding: 22px 18px;
            }
        }
    </style>
</head>
<body>

    <!-- 山水背景 -->
    <div class="mountains">
        <div class="mountain m1"></div>
        <div class="mountain m2"></div>
        <div class="mountain m3"></div>
        <div class="mountain m4"></div>
    </div>
    <div class="clouds">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>

    <div class="birds">

    <div class="container">

        <!-- 标题 -->
        <div class="page-title">

        <!-- 分类卡片 -->

        </div>

        <!-- 古代史 -->
        <div class="section" id="gudaishi">

                    <a href="唐朝/唐朝.html">唐朝</a>

        <div class="section" id="jindaishi">
            <div class="section-header">
                <span class="section-title">🏙️ 近代史</span>

        <!-- 页脚 -->
        <div class="footer">
            ── <span class="name">Shelly Liu</span> ──
        </div>

    </div>

</body>
</html>
