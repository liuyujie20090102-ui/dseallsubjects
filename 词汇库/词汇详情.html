<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詞彙詳情 · DSE 學習站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ed;
            --text-primary: #2c2416;
            --text-secondary: #5c5347;
            --text-muted: #a09880;
            --gold: #8b6914;
            --gold-light: #c4a97d;
            --card-bg: rgba(255,253,248,0.8);
            --font-cn: "Noto Serif TC","PingFang SC","Microsoft YaHei","KaiTi",serif;
            --font-en: "Inter","Helvetica Neue",sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background-color:var(--bg);
            font-family:var(--font-cn);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:32px 20px 48px;
            position:relative;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }
        body::before{
            content:"";
            position:fixed;top:0;left:0;width:100%;height:100%;
            pointer-events:none;z-index:0;
            background-image:
                repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(139,119,80,0.012) 3px,rgba(139,119,80,0.012) 4px),
                repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(139,119,80,0.008) 5px,rgba(139,119,80,0.008) 6px);
            opacity:0.7;
        }
        .mountains{position:fixed;bottom:0;left:0;width:100%;height:30%;pointer-events:none;z-index:0}
        .mountain{position:absolute;bottom:0}
        .m1{left:-8%;width:45%;height:55%;background:rgba(120,100,70,0.12);border-radius:55% 55% 0 0}
        .m2{left:22%;width:50%;height:68%;background:rgba(100,80,55,0.16);border-radius:50% 48% 0 0}
        .m3{right:-8%;width:42%;height:60%;background:rgba(80,60,40,0.2);border-radius:52% 52% 0 0}
        .clouds{position:fixed;bottom:12%;left:0;width:100%;height:18%;pointer-events:none;z-index:0}
        .cloud{position:absolute;background:rgba(255,252,245,0.7);border-radius:50%;filter:blur(28px)}
        .c1{width:260px;height:50px;left:8%;bottom:30px;opacity:0.5}
        .c2{width:220px;height:42px;right:12%;bottom:15px;opacity:0.4}
        .c3{width:180px;height:35px;left:50%;bottom:8px;opacity:0.35;transform:translateX(-50%)}
        .birds{position:fixed;top:12%;right:12%;pointer-events:none;z-index:0;opacity:0.3}
        .bird{display:inline-block;font-size:13px;margin:0 5px;animation:birdFloat 6s ease-in-out infinite}
        .bird:nth-child(2){animation-delay:1.5s;font-size:9px}
        .bird:nth-child(3){animation-delay:3s;font-size:11px}
        @keyframes birdFloat{0%,100%{transform:translateY(0) translateX(0)}25%{transform:translateY(-7px) translateX(3px)}50%{transform:translateY(-2px) translateX(8px)}75%{transform:translateY(-9px) translateX(3px)}}
        .container{position:relative;z-index:1;width:100%;max-width:650px}
        .back-link{display:inline-block;color:var(--text-muted);text-decoration:none;font-size:14px;margin-bottom:24px;letter-spacing:1px}
        .back-link:hover{color:var(--gold)}
        .word-en{text-align:center;font-family:var(--font-en);font-size:32px;font-weight:700;color:var(--text-primary);letter-spacing:2px;margin-bottom:8px}
        .word-zh{text-align:center;font-size:18px;color:var(--gold);letter-spacing:2px;margin-bottom:36px}
        .section{margin-bottom:28px}
        .section-title{font-size:15px;font-weight:600;color:var(--text-primary);letter-spacing:2px;margin-bottom:10px;padding-left:8px;border-left:3px solid var(--gold-light)}
        table{width:100%;border-collapse:collapse;margin:12px 0;font-size:14px}
        th{background:rgba(180,160,130,0.15);color:#2c2416;padding:10px 12px;text-align:center;font-weight:600;border:1px solid rgba(180,160,130,0.2)}
        td{padding:9px 12px;border:1px solid rgba(180,160,130,0.2);color:#5c5347;line-height:1.7}
        td:first-child{font-weight:600;color:#2c2416;text-align:center;background:rgba(180,160,130,0.05)}
        .搭配-list{list-style:none;padding:0}
        .搭配-list li{padding:8px 14px;margin:4px 0;background:rgba(255,253,248,0.6);border-radius:8px;color:#5c5347;line-height:1.8}
        .搭配-list li span.en{font-weight:600;color:#2c2416}
        .例句-box{background:rgba(255,253,248,0.6);border-left:3px solid var(--gold-light);padding:14px 18px;border-radius:0 8px 8px 0;color:#5c5347;line-height:1.9;font-style:italic}
        .not-found{text-align:center;color:var(--text-muted);padding:48px 0;font-size:16px}
        .game-section{margin-top:36px;padding-top:24px;border-top:2px solid rgba(180,160,130,0.3);text-align:center}
        .game-btn{
            display:inline-block;padding:14px 36px;
            background:var(--gold);color:#fff;border:none;border-radius:28px;
            font-family:var(--font-cn);font-size:17px;letter-spacing:3px;text-decoration:none;
            transition:all 0.3s;
        }
        .game-btn:hover{background:#6b4f0f;transform:translateY(-2px);box-shadow:0 4px 16px rgba(60,40,20,0.12)}
        .footer{text-align:center;font-family:var(--font-en);font-size:11px;color:var(--text-muted);letter-spacing:2px;padding-top:40px}
        @media(max-width:480px){
            .word-en{font-size:26px}.word-zh{font-size:16px}
            table{font-size:13px}th,td{padding:7px 8px}
        }
    </style>
</head>
<body>
    <div class="mountains"><div class="mountain m1"></div><div class="mountain m2"></div><div class="mountain m3"></div></div>
    <div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div></div>
    <div class="birds"><span class="bird">⩳</span><span class="bird">⩳</span><span class="bird">⩳</span></div>
    <div class="container">
        <a href="论证.html" class="back-link">← 返回列表</a>
        <div id="detail-content"></div>
        <div class="footer">── Shelly Liu ──</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const wordId = params.get('id');
        const dataFiles = ['论证数据.js'];

        function findWordById(id) {
            if (typeof 论证词汇数据 !== 'undefined') {
                const found = 论证词汇数据.find(item => item.id === id);
                if (found) return found;
            }
            return null;
        }

        function renderDetail() {
            const container = document.getElementById('detail-content');
            if (!wordId) { container.innerHTML = '<div class="not-found">未指定詞彙 ID</div>'; return; }
            const word = findWordById(wordId);
            if (!word) { container.innerHTML = '<div class="not-found">找不到詞彙：' + wordId + '</div>'; return; }

            let html = '';
            html += '<div class="word-en">' + word.英文 + '</div>';
            html += '<div class="word-zh">' + word.中文 + '</div>';

            if (word.家族词 && word.家族词.length > 0) {
                html += '<div class="section"><div class="section-title">家族詞</div><table><tr><th>形式</th><th>詞</th><th>中文</th></tr>';
                word.家族词.forEach(item => { html += '<tr><td>' + item.形式 + '</td><td>' + item.词 + '</td><td>' + item.中文 + '</td></tr>'; });
                html += '</table></div>';
            }
            if (word.近义词 && word.近义词.length > 0) {
                html += '<div class="section"><div class="section-title">近義詞</div><table><tr><th>詞</th><th>中文</th><th>使用場景</th></tr>';
                word.近义词.forEach(item => { html += '<tr><td>' + item.词 + '</td><td>' + item.中文 + '</td><td>' + item.场景 + '</td></tr>'; });
                html += '</table></div>';
            }
            if (word.反义词 && word.反义词.length > 0) {
                html += '<div class="section"><div class="section-title">反義詞</div><table><tr><th>詞</th><th>中文</th><th>使用場景</th></tr>';
                word.反义词.forEach(item => { html += '<tr><td>' + item.词 + '</td><td>' + item.中文 + '</td><td>' + item.场景 + '</td></tr>'; });
                html += '</table></div>';
            }
            if (word.搭配 && word.搭配.length > 0) {
                html += '<div class="section"><div class="section-title">固定搭配</div><ul class="搭配-list">';
                word.搭配.forEach(item => { html += '<li><span class="en">' + item.英文 + '</span> — ' + item.中文 + '</li>'; });
                html += '</ul></div>';
            }
            if (word.例句) {
                html += '<div class="section"><div class="section-title">例句</div><div class="例句-box">' + word.例句 + '</div></div>';
            }

            html += '<div class="game-section"><a href="游戏.html?id=' + encodeURIComponent(wordId) + '" class="game-btn">🎮 開始挑戰</a></div>';
            container.innerHTML = html;
        }

        function loadDataFiles(files, callback) {
            let loaded = 0;
            files.forEach(file => {
                const script = document.createElement('script');
                script.src = file;
                script.onload = () => { loaded++; if (loaded === files.length) callback(); };
                script.onerror = () => { loaded++; if (loaded === files.length) callback(); };
                document.head.appendChild(script);
            });
        }

        loadDataFiles(dataFiles, renderDetail);
    </script>
</body>
</html>
