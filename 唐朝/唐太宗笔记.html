<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>唐太宗 · 筆記</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ed;
            --text-primary: #2c2416;
            --text-secondary: #5c5347;
            --text-muted: #a09880;
            --gold: #8b6914;
            --gold-light: #c4a97d;
            --ink-light: rgba(60,40,20,0.06);
            --mountain-far: rgba(120,100,70,0.12);
            --mountain-mid: rgba(100,80,55,0.16);
            --mountain-near: rgba(80,60,40,0.2);
            --cloud: rgba(255,252,245,0.7);
            --card-bg: rgba(255,253,248,0.8);
            --font-cn: "Noto Serif TC","PingFang SC","Microsoft YaHei","KaiTi",serif;
            --font-en: "Inter","Helvetica Neue",sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background-color:var(--bg);
            font-family:var(--font-cn);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:32px 20px 48px;
            position:relative;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }
        body::before{
            content:"";
            position:fixed;top:0;left:0;
            width:100%;height:100%;
            pointer-events:none;z-index:0;
            background-image:
                repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(139,119,80,0.012) 3px,rgba(139,119,80,0.012) 4px),
                repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(139,119,80,0.008) 5px,rgba(139,119,80,0.008) 6px);
            opacity:0.7;
        }
        .mountains{position:fixed;bottom:0;left:0;width:100%;height:30%;pointer-events:none;z-index:0}
        .mountain{position:absolute;bottom:0}
        .mountain.m1{left:-8%;width:45%;height:55%;background:var(--mountain-far);border-radius:55% 55% 0 0}
        .mountain.m2{left:22%;width:50%;height:68%;background:var(--mountain-mid);border-radius:50% 48% 0 0}
        .mountain.m3{right:-8%;width:42%;height:60%;background:var(--mountain-near);border-radius:52% 52% 0 0}
        .clouds{position:fixed;bottom:12%;left:0;width:100%;height:18%;pointer-events:none;z-index:0}
        .cloud{position:absolute;background:var(--cloud);border-radius:50%;filter:blur(28px)}
        .cloud.c1{width:260px;height:50px;left:8%;bottom:30px;opacity:0.5}
        .cloud.c2{width:220px;height:42px;right:12%;bottom:15px;opacity:0.4}
        .cloud.c3{width:180px;height:35px;left:50%;bottom:8px;opacity:0.35;transform:translateX(-50%)}
        .birds{position:fixed;top:12%;right:12%;pointer-events:none;z-index:0;opacity:0.3}
        .bird{display:inline-block;font-size:13px;margin:0 5px;animation:birdFloat 6s ease-in-out infinite}
        .bird:nth-child(2){animation-delay:1.5s;font-size:9px}
        .bird:nth-child(3){animation-delay:3s;font-size:11px}
        @keyframes birdFloat{
            0%,100%{transform:translateY(0) translateX(0)}
            25%{transform:translateY(-7px) translateX(3px)}
            50%{transform:translateY(-2px) translateX(8px)}
            75%{transform:translateY(-9px) translateX(3px)}
        }

        .container{position:relative;z-index:1;width:100%;max-width:650px}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
        .back-link{color:var(--text-muted);text-decoration:none;font-size:14px;letter-spacing:1px;transition:color 0.3s}
        .back-link:hover{color:var(--text-primary)}
        .page-indicator{font-family:var(--font-en);font-size:13px;color:var(--text-muted);letter-spacing:1px}

        .page-card{
            background:var(--card-bg);
            backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
            border:1px solid rgba(180,160,130,0.2);
            border-radius:16px;
            padding:36px 32px;
            min-height:420px;
            box-shadow:0 2px 20px rgba(60,40,20,0.04);
        }

        .note-title{text-align:center;font-size:24px;font-weight:700;color:var(--text-primary);letter-spacing:3px;margin-bottom:24px}
        .section-label{text-align:center;font-size:16px;font-weight:600;color:var(--text-muted);letter-spacing:3px;margin-bottom:20px}
        .item-title{font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:12px;letter-spacing:1px}
        .content{font-size:16px;color:var(--text-secondary);line-height:2;letter-spacing:0.5px}
        .content p{margin-bottom:8px}
        .content ul{list-style:none;padding-left:0;margin-bottom:12px}
        .content ul li{padding:3px 0 3px 20px;position:relative;line-height:1.9}
        .content ul li::before{content:"·";position:absolute;left:4px;color:var(--gold-light);font-weight:bold;font-size:18px}
        .content ul li.sub{padding-left:36px}
        .content ul li.sub::before{content:"·";left:18px;color:var(--text-muted);font-size:14px}
        .content ul li.sub2{padding-left:48px}
        .content ul li.sub2::before{content:"·";left:32px;color:var(--text-muted);font-size:12px}
        .content strong{color:var(--text-primary);font-weight:600}
        .content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:14px}
        .content table th{background:rgba(180,160,130,0.15);color:var(--text-primary);padding:8px 10px;text-align:center;font-weight:600;border:1px solid rgba(180,160,130,0.2)}
        .content table td{padding:7px 10px;border:1px solid rgba(180,160,130,0.2);color:var(--text-secondary);line-height:1.6}
        .content table td:first-child{font-weight:600;color:var(--text-primary);text-align:center;background:rgba(180,160,130,0.05)}

        .quote-block{margin:14px 0;padding:14px 18px;border-left:3px solid var(--gold-light);background:rgba(196,169,125,0.06);border-radius:0 8px 8px 0;font-style:italic;color:var(--text-secondary);font-size:15px;line-height:1.9}
        .quote-block .quote-author{display:block;text-align:right;font-style:normal;font-size:13px;color:var(--text-muted);margin-top:4px}

        .nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:12px}
        .nav-btn{padding:10px 22px;background:rgba(255,253,248,0.7);border:1px solid rgba(180,160,130,0.25);border-radius:20px;cursor:pointer;font-family:var(--font-cn);font-size:14px;color:var(--text-secondary);letter-spacing:1px;transition:all 0.3s}
        .nav-btn:hover{background:rgba(180,160,130,0.12);color:var(--text-primary)}
        .nav-btn:disabled{opacity:0.3;cursor:default;pointer-events:none}
        .nav-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:220px}
        .nav-dot{width:5px;height:5px;border-radius:50%;background:var(--text-muted);opacity:0.3;cursor:pointer;transition:all 0.3s}
        .nav-dot.active{opacity:1;background:var(--gold);width:16px;border-radius:3px}

        .footer{text-align:center;font-family:var(--font-en);font-size:11px;color:var(--text-muted);letter-spacing:2px;padding-top:24px}

        @media (max-width:480px){
            .page-card{padding:24px 16px}
            .note-title{font-size:20px}
            .item-title{font-size:16px}
            .content{font-size:15px}
            .content table{font-size:12px}
            .nav-btn{padding:8px 14px;font-size:13px}
        }
    </style>
</head>
<body>

        <div class="mountain m1"></div>
        <div class="mountain m2"></div>
        <div class="mountain m3"></div>
    </div>
    <div class="clouds">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>

    <div class="birds">

    <div class="container">

        </div>

        <div class="page-card">
            <div id="page-content"></div>

        <div class="nav-bar">
            <button class="nav-btn" id="prev-btn" onclick="prevPage()">← 上一頁</button>
            <div class="nav-dots" id="nav-dots"></div>
            <button class="nav-btn" id="next-btn" onclick="nextPage()">下一頁 →</button>
        </div>

        <div class="footer">── Shelly Liu ──</div>

    </div>

    <script>
        const pages = [
            `<div class="note-title">👑 唐太宗</div>
             <div class="section-label">── 背景 ──</div>
             <div class="content">
             <ul>
             <li>户口由隋炀帝时<strong>八百九十万户</strong>下跌至<strong>两百万户</strong></li>
             <li>对外须面对<strong>突厥</strong>威胁</li>
             <li><strong>玄武门之变</strong>后，朝廷社会人心惶惶</li>
             </ul>
             </div>`,

            `<div class="section-label">── 政制方面 ──</div>
             <div class="item-title">1. 改良中央政制</div>
             <div class="content">
             <p><strong>措施</strong></p>
             <ul>
             <li>继承隋代<strong>三省六部制</strong></li>
             <li class="sub">中书省：起草诏令</li>
             <li class="sub">门下省：审查诏令</li>
             <li class="sub">尚书省：执行法令，下设六部（吏、户、礼、兵、刑、工）</li>
             <li>设<strong>政事堂</strong>，三省长官及带衔官员入内决策</li>
             </ul>
             <p><strong>成效：</strong>协调三省运作，消除分歧，提升效率</p>
             <div class="quote-block">「不经凤阁鸾台，何名为敕？」<span class="quote-author">→ 未经中书起草、门下审核，不能称为诏令</span></div>
             </div>`,

            `<div class="item-title">三省分立的作用</div>
             <div class="content">
             <p><strong>好处</strong></p>
             <ul><li>步骤精密，有制衡作用</li><li>防止宰相专权</li><li>对君权有一定制衡</li></ul>
             <p><strong>坏处</strong></p>
             <ul><li>经多重程序，效率降低</li><li>引发宰臣争执，促成朋党</li></ul>
             </div>`,

            `<div class="section-label">── 政制方面 ──</div>
             <div class="item-title">2. 改良地方政制</div>
             <div class="content">
             <p><strong>措施</strong></p>
             <ul>
             <li>沿用隋代<strong>州县二级制</strong></li>
             <li>分全国为<strong>10道</strong>（类似汉武帝13州），作为州县之上的监察区</li>
             <li>不定期派遣<strong>巡察使</strong>到地方监察刺史施政</li>
             </ul>
             <p><strong>目的：</strong>了解地方民情，加强监察地方施政</p>
             </div>`,

            `<div class="item-title">3. 确立科举制</div>
             <div class="content">
             <p><strong>措施：</strong>继承并确立科举制，以<strong>明经、进士</strong>两科最为重要</p>
             <ul>
             <li class="sub">明经：以释经义为主，加试策论</li>
             <li class="sub">进士：以诗赋为主，加试经义、时务策</li>
             </ul>
             <p><strong>成效：</strong>科举成为唐代选拔官员的主要途径</p>
             <div class="quote-block">「天下英雄，入吾彀中矣」<span class="quote-author">—— 唐太宗</span></div>
             </div>`,

            `<div class="item-title">科举制 · 好处与局限</div>
             <div class="content">
             <p><strong>好处</strong></p>
             <ul><li>平民有晋升政坛的机会</li><li>促进社会阶级流动</li><li>吸纳大量人才</li></ul>
             <p><strong>局限</strong></p>
             <ul><li>明经徒诵经文，进士只重诗赋</li><li>所习无益于治道，与实际政事脱节</li></ul>
             </div>`,

            `<div class="item-title">4. 选贤任能</div>
             <div class="content">
             <p><strong>原则：</strong>用人唯才，不问出身与恩怨</p>
             <table>
             <tr><th>人物</th><th>背景</th><th>特点</th></tr>
             <tr><td><strong>房玄龄</strong></td><td>隋朝旧臣</td><td>善于谋划政令，人称「房谋」</td></tr>
             <tr><td><strong>杜如晦</strong></td><td>太宗旧部</td><td>善于决断政策，人称「杜断」</td></tr>
             <tr><td><strong>魏征</strong></td><td>原为李建成旧臣，昔日仇敌</td><td>直言敢谏，太宗不计前嫌重用</td></tr>
             <tr><td><strong>李靖</strong></td><td>—</td><td>善于用兵，曾领军对抗突厥</td></tr>
             <tr><td><strong>长孙无忌</strong></td><td>宗亲外戚</td><td>与房杜策划玄武门之变</td></tr>
             </table>
             <p style="text-align:center;color:var(--gold);margin-top:8px">房玄龄与杜如晦合称<strong>「房谋杜断」</strong></p>
             </div>`,

            `<div class="item-title">5. 善于纳谏</div>
             <div class="content">
             <p><strong>背景：</strong>太宗以<strong>隋炀帝拒谏亡国</strong>为鉴</p>
             <p><strong>措施</strong></p>
             <ul>
             <li>即位后广开言路，鼓励群臣进谏</li>
             <li>扩大谏官职权</li>
             <li class="sub">宰相入阁议事须有谏官陪同</li>
             <li class="sub">三品以上官员议事谏官随从左右，有错即谏</li>
             </ul>
             <p><strong>成效：</strong>贞观朝谏臣涌现，太宗虚心纳谏，减少施政失误</p>
             <p><strong>例子</strong></p>
             <ul>
             <li>贞观四年，太宗下令修洛阳宫，遭<strong>张玄素</strong>谏止</li>
             <li><strong>魏征</strong>曾犯颜直谏十次，太宗大力嘉赏</li>
             </ul>
             <div class="quote-block">「以铜为镜，可以正衣冠；以古为镜，可以知兴替；以人为镜，可以明得失」<span class="quote-author">—— 魏征死后，太宗感叹</span></div>
             </div>`,

            `<div class="item-title">6. 留心吏治</div>
             <div class="content">
             <p><strong>措施</strong></p>
             <ul>
             <li><strong>考察地方官</strong></li>
             <li class="sub">命李靖等13人为<strong>黜陟大使</strong>，考察地方官勤惰并如实上报</li>
             <li class="sub2">* 黜，贬退；陟，提拔</li>
             <li><strong>记功过屏风</strong></li>
             <li class="sub">亲自挑选各州刺史，将其名字及功过记在屏风上，以备升贬</li>
             <li><strong>轮流值宿</strong></li>
             <li class="sub">规定五品以上京官轮流值宿中书省，以便随时垂询民情</li>
             <li><strong>省并冗官</strong></li>
             <li class="sub">命<strong>房玄龄</strong>省并冗官，以改善吏治</li>
             </ul>
             </div>`,

            `<div class="item-title">7. 律法宽仁</div>
             <div class="content">
             <p><strong>原则：</strong>以「<strong>慎刑宽简</strong>」为原则</p>
             <p><strong>措施</strong></p>
             <ul>
             <li><strong>编定《唐律》</strong></li>
             <li class="sub">命<strong>长孙无忌</strong>以宽仁慎刑宗旨编定，减轻刑罚，废除酷刑</li>
             <li><strong>死刑复奏</strong></li>
             <li class="sub">死刑须经<strong>三复奏</strong>（地方）或<strong>五复奏</strong>（京师）</li>
             <li><strong>设三司使</strong></li>
             <li class="sub">由大理寺卿、刑部尚书侍郎、御史中丞会审重大案件</li>
             <li><strong>以身作则</strong></li>
             <li class="sub">太宗以身作则，宗室犯法亦须受审</li>
             <li class="sub2">如李元婴违法被削封</li>
             </ul>
             </div>`,

            `<div class="item-title">8. 平抑门第</div>
             <div class="content">
             <p><strong>背景：</strong>旧氏族垄断政治，门第观念深厚</p>
             <p><strong>措施</strong></p>
             <ul>
             <li>命高士廉修<strong>《氏族志》</strong>，以功臣代替世胄，科举代替门第</li>
             <li>打击山东士族集团，特别是<strong>崔、卢、李、郑</strong>等大姓</li>
             </ul>
             <p><strong>成效</strong></p>
             <ul><li>平民可透过科举上升，社会安定团结</li><li>加强寒门子弟对国家的向心力</li></ul>
             <p><strong>局限</strong></p>
             <ul><li>未彻底打破门阀观念，大族在婚姻上自矜高贵</li><li>如房玄龄等重臣仍与山东旧族联姻</li></ul>
             </div>`,

            `<div class="section-label">── 经济方面 ──</div>
             <div class="content"><p><strong>背景</strong></p><ul><li>隋末大兴土木、对外用兵，民变起事，民不聊生，社会经济受破坏</li></ul></div>
             <div class="item-title" style="margin-top:16px">1. 改良均田制</div>
             <div class="content">
             <p><strong>措施</strong></p>
             <ul>
             <li><strong>按丁授田</strong></li>
             <li class="sub">唐初沿用隋代均田制，按丁授田</li>
             <li class="sub">十八岁以上丁男获<strong>八十亩口分田、二十亩永业田</strong></li>
             <li><strong>狭乡减半</strong></li>
             <li class="sub">狭乡授田减半，鼓励百姓迁往宽乡</li>
             </ul>
             <p><strong>配套规定</strong></p>
             <ul><li>贫苦者优先有田，若荒废土地则会受罚</li><li>黄河流域地少人多，女子不再授田，亦不用服役</li></ul>
             <p><strong>成效：</strong>土地得到妥善分配，有利恢复生产</p>
             </div>`,

            `<div class="item-title">2. 轻徭薄赋</div>
             <div class="content">
             <p><strong>措施</strong></p>
             <ul>
             <li><strong>田租</strong></li>
             <li class="sub">贞观年间田租约为<strong>四十税一</strong>，比汉初三十税一更低</li>
             <li><strong>力役</strong></li>
             <li class="sub">每年<strong>二十天</strong>，比汉代少十天</li>
             <li class="sub">多纳租调者可免除力役</li>
             <li><strong>禁加征</strong></li>
             <li class="sub">各州县在正赋之外，不得随便加征</li>
             </ul>
             <p><strong>成效：</strong>百姓负担较轻，国家收入更稳定</p>
             </div>`,

            `<div class="item-title">3. 重视民生</div>
             <div class="content">
             <p><strong>背景</strong></p>
             <div class="quote-block">「为君之道，必须先存百姓。若损百姓以奉其身，犹割股以啖腹，腹饱而身毙。」<span class="quote-author">—— 唐太宗</span></div>
             <p><strong>措施</strong></p>
             <ul>
             <li><strong>作《帝范》</strong></li><li class="sub">给太子李治，叮嘱其体察民情</li>
             <li><strong>改冠礼</strong></li><li class="sub">将太子冠礼由二月改为十月，避免影响农民耕作</li>
             <li><strong>赈灾减税</strong></li><li class="sub">遇有饥荒时，减轻赋税，甚至开仓赈济</li>
             <li><strong>提倡节俭</strong></li><li class="sub">遣散宫女三千人，免去四方珍贡，以纾解民困</li>
             </ul>

        let currentPage = 0;
        const totalPages = pages.length;

        function renderPage() {
            document.getElementById('page-content').innerHTML = pages[currentPage];
            document.getElementById('page-indicator').textContent = (currentPage + 1) + ' / ' + totalPages;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = currentPage === totalPages - 1;
            const dots = document.getElementById('nav-dots');
            dots.innerHTML = '';
            for (let i = 0; i < totalPages; i++) {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (i === currentPage ? ' active' : '');
                dot.onclick = () => { currentPage = i;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' }); };
                dots.appendChild(dot);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextPage() { if (currentPage < totalPages - 1) { currentPage++;
                renderPage(); } }

        function prevPage() { if (currentPage > 0) { currentPage--;
                renderPage(); } }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; });
        document.addEventListener('touchend', function(e) {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) { if (diff > 0) nextPage();
                else prevPage(); }
        });

        renderPage();
    </script>
