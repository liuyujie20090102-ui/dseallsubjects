<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE 學習站 · Shelly Liu</title>
    <!-- Google Fonts: 思源宋体 + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf9f6;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.9);
            --text-primary: #1a1a2e;
            --text-secondary: #5c5c6e;
            --text-muted: #b0a89c;
            --gold: #c4a97d;
            --f4-accent: #6b7b8d;
            --f5-accent: #7a9a7e;
            --f6-accent: #c49b6c;
            --glow-warm: rgba(210, 180, 140, 0.15);
            --glow-cool: rgba(160, 180, 200, 0.1);
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 12px 32px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --font-cn: "Noto Serif TC", "PingFang SC", "Microsoft YaHei", serif;
            --font-en: "Inter", "Helvetica Neue", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            font-family: var(--font-cn);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 纸质纹理 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.008) 2px, rgba(0, 0, 0, 0.008) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0, 0, 0, 0.006) 2px, rgba(0, 0, 0, 0.006) 3px);
        }

        /* 渐变光晕 */
        .glow {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(120px);
            opacity: 0.5;
        }
        .glow.g1 {
            width: 500px;
            height: 500px;
            background: var(--glow-warm);
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
        }
        .glow.g2 {
            width: 400px;
            height: 400px;
            background: var(--glow-cool);
            bottom: -120px;
            right: -100px;
        }
        .glow.g3 {
            width: 350px;
            height: 350px;
            background: var(--glow-warm);
            bottom: 20%;
            left: -120px;
            opacity: 0.35;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 780px;
        }

        /* 标题区 */
        .header {
            text-align: center;
            margin-bottom: 36px;
            animation: fadeInUp 0.7s ease-out;
        }
        .header .logo {
            font-family: var(--font-en);
            font-size: 11px;
            letter-spacing: 6px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .header h1 {
            font-family: var(--font-cn);
            font-size: 34px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 3px;
            margin-bottom: 6px;
        }
        .header .subtitle {
            font-family: var(--font-en);
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 5px;
            font-weight: 400;
        }

        /* 金句区 */
        .quote-wrapper {
            text-align: center;
            margin-bottom: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 0.7s ease-out 0.2s both;
        }
        .quote-wrapper .quote-mark {
            font-family: var(--font-cn);
            font-size: 44px;
            color: var(--gold);
            line-height: 1;
            margin-right: 6px;
            opacity: 0.4;
            position: relative;
            top: -6px;
        }
        .quote-wrapper .quote-text {
            font-family: var(--font-cn);
            font-size: 15px;
            color: var(--text-secondary);
            font-style: italic;
            letter-spacing: 1px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* 年级标签 */
        .grade-label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeInUp 0.7s ease-out 0.35s both;
        }
        .grade-label .grade-tag {
            font-family: var(--font-en);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            padding: 6px 16px;
            border-radius: 20px;
            color: #fff;
        }
        .grade-label .grade-tag.f4 {
            background: var(--f4-accent);
        }
        .grade-label .grade-tag.f5 {
            background: var(--f5-accent);
        }
        .grade-label .grade-tag.f6 {
            background: var(--f6-accent);
        }
        .grade-label .grade-line {
            flex: 1;
            height: 1px;
            background: #e5e0d8;
        }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 14px;
        }
        .card-grid.second-row {
            grid-template-columns: repeat(3, 1fr);
            max-width: 75%;
        }
        .card-grid:last-of-type {
            margin-bottom: 36px;
        }

        /* 卡片 - 玻璃拟态 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 26px 16px 22px;
            text-align: center;
            cursor: pointer;
            position: relative;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2), box-shadow 0.3s ease;
            text-decoration: none;
            display: block;
            animation: fadeInUp 0.7s ease-out both;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }
        .card:active {
            transform: scale(0.97);
            transition: transform 0.1s ease;
        }
        .card .card-icon {
            font-size: 30px;
            margin-bottom: 10px;
            display: block;
            transition: transform 0.3s ease;
        }
        .card:hover .card-icon {
            transform: scale(1.15);
        }
        .card .card-name {
            font-family: var(--font-cn);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 1px;
        }
        .card.disabled {
            opacity: 0.5;
            cursor: default;
            pointer-events: none;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            font-family: var(--font-en);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            animation: fadeInUp 0.7s ease-out 0.9s both;
        }
        .footer .name {
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .card-grid.second-row {
                grid-template-columns: repeat(2, 1fr);
                max-width: 100%;
            }
            .header h1 {
                font-size: 26px;
            }
            .quote-wrapper .quote-text {
                font-size: 14px;
            }
            body {
                padding: 32px 16px;
            }
        }
        @media (max-width: 480px) {
            .card-grid,
            .card-grid.second-row {
                grid-template-columns: repeat(2, 1fr);
                max-width: 100%;
            }
            .card {
                padding: 18px 12px;
            }
            .card .card-icon {
                font-size: 24px;
            }
            .card .card-name {
                font-size: 13px;
            }
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

    <script>
        // 金句库
        const quotes = [
            "學習的痛苦是一時的，不學習的痛苦是一生的。",
            "今天的努力，是明天的底氣。",
            "每一個優秀的人，都有一段沉默的時光。",
            "DSE不是終點，而是你證明自己的舞台。",
            "知識就是力量，複習就是給力量充電。",
            "不怕慢，就怕站。每天進步一點點。",
            "你現在付出的每一分鐘，都在為未來投票。",
            "與其仰望星空，不如腳踏實地。",
            "成功的路上並不擁擠，因為堅持的人不多。",
            "把每一次複習，都當作最後一次。",
            "自律的頂端是享受孤獨。",
            "你未來的樣子，藏在你現在的努力裡。",
            "所有的一鳴驚人，都是厚積薄發。",
            "不要假裝很努力，結果不會陪你演戲。",
            "你背不下來的書，總有人能背下來。",
            "堅持很苦，但後悔更苦。",
            "唯有努力，不負光陰。",
            "心之所向，素履以往。",
            "沒有一蹴而就的成功，只有日積月累的堅持。",
            "全力以赴，而後順其自然。",
            "你有多自律，就有多自由。",
            "星光不問趕路人，時光不負有心人。",
            "積土成山，風雨興焉；積水成淵，蛟龍生焉。",
            "騏驥一躍，不能十步；駑馬十駕，功在不舍。",
            "鍥而不捨，金石可鏤。",
            "博觀而約取，厚積而薄發。",
            "書山有路勤為徑，學海無涯苦作舟。",
            "寶劍鋒從磨礪出，梅花香自苦寒來。",
            "千淘萬漉雖辛苦，吹盡狂沙始到金。",
            "長風破浪會有時，直掛雲帆濟滄海。"
        ];

        const quoteText = document.getElementById('quote-text');

        function showRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            quoteText.style.opacity = '0';
            quoteText.style.transform = 'translateY(8px)';
            setTimeout(() => {
                quoteText.textContent = quotes[randomIndex];
                quoteText.style.opacity = '1';
                quoteText.style.transform = 'translateY(0)';
            }, 400);
        }

        showRandomQuote();
        setInterval(showRandomQuote, 8000);
    </script>
