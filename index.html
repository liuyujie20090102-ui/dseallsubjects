let currentCategory=null,currentQuestionIndex=0,questionQueue=[],currentPopup=null,checked=false,revealed=false,currentMode='fill';

function saveCleared(){try{localStorage.setItem('tangFinalCleared',JSON.stringify(clearedCategories));}catch(e){}}

function renderHome(){
    const grid=document.getElementById('category-grid');grid.innerHTML='';

        const total=cat.questions.length,cleared=clearedCategories[cat.id]||false;

        card.onclick=function(){startCategory(cat.id);};
        card.innerHTML=`<div><div class="cat-name">${cat.icon} ${cat.name}</div><div class="cat-stats">${total}道题</div><div class="mastery-dots">${Array.from({length:Math.min(total,6)}).map(()=>cleared?'<div class="dot filled"></div>':'<div class="dot"></div>').join('')}</div></div><div class="cat-badge">${cleared?'✅ 已通关':'开始挑战 →'}</div>`;
        grid.appendChild(card);
    });
}
function startCategory(catId){
    currentCategory=categories.find(c=>c.id===catId);
    if(!currentCategory||currentCategory.questions.length===0){alert('该领域无题目');return;}
    questionQueue=[...Array(currentCategory.questions.length).keys()];shuffle(questionQueue);currentQuestionIndex=0;
    document.getElementById('home-page').style.display='none';document.getElementById('game-page').style.display='block';
    showKeyword();
}
function startRandom(){startCategory(categories[Math.floor(Math.random()*categories.length)].id);}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
function closePopup(){if(currentPopup){currentPopup.style.display='none';currentPopup=null;}}

function showKeyword(){
    if(currentQuestionIndex>=questionQueue.length){clearedCategories[currentCategory.id]=true;saveCleared();alert('🎉 本领域全部完成！');goHome();return;}
    const q=currentCategory.questions[questionQueue[currentQuestionIndex]];
    document.getElementById('kw-label').textContent=currentCategory.icon+' '+currentCategory.name;
    document.getElementById('kw-keyword').textContent=q.keyword;
    document.getElementById('kw-hint').textContent='💡 提示：'+q.kwHint;
    document.getElementById('reveal-btn').style.display='inline-block';
    document.getElementById('keyword-card').style.display='block';
    document.getElementById('answer-area').style.display='none';
    document.getElementById('game-progress').innerHTML='进度：<span>'+(currentQuestionIndex+1)+'</span> / '+questionQueue.length;
    currentMode='fill';updateModeButtons();
    window.scrollTo({top:0,behavior:'smooth'});
}

function revealNote(){
    document.getElementById('reveal-btn').style.display='none';
    const q=currentCategory.questions[questionQueue[currentQuestionIndex]];
    document.getElementById('answer-title').textContent='📜 '+q.keyword;
    document.getElementById('answer-area').style.display='block';
    document.getElementById('result-msg').textContent='';document.getElementById('result-msg').className='result-msg';
    document.getElementById('check-btn').style.display='block';document.getElementById('check-btn').disabled=false;
    document.getElementById('reveal-answer-btn').style.display='block';
    document.getElementById('reset-btn').style.display='block';document.getElementById('next-btn2').style.display='none';
    checked=false;revealed=false;currentMode='fill';updateModeButtons();
    renderMode();
    document.getElementById('answer-area').scrollIntoView({behavior:'smooth',block:'center'});
}

function switchMode(mode){
    currentMode=mode;updateModeButtons();renderMode();
}
function updateModeButtons(){
    document.getElementById('mode-fill').classList.toggle('active',currentMode==='fill');
    document.getElementById('mode-choice').classList.toggle('active',currentMode==='choice');
    document.getElementById('mode-full').classList.toggle('active',currentMode==='full');
}

function renderMode(){
    const q=currentCategory.questions[questionQueue[currentQuestionIndex]];
    let html='';
    if(currentMode==='full'){html=q.fullHTML||q.fillHTML||q.matchHTML||q.choiceHTML||'';}
    else if(currentMode==='choice'){
        if(q.type==='choice'){html=q.choiceHTML;}
        else if(q.type==='match'||q.type==='matchTable'){html=q.matchHTML.replace(/<span class="slot"/g,'<span class="slot-choice"');}
        else{html=q.fillHTML.replace(/<span class="slot"/g,'<span class="slot-choice"');}
    }else{
        if(q.type==='choice'){html=q.choiceHTML;}
        else if(q.type==='match'||q.type==='matchTable'){html=q.matchHTML;}
        else{html=q.fillHTML;}
    }
    document.getElementById('answer-body').innerHTML=html;
    document.getElementById('result-msg').textContent='';document.getElementById('result-msg').className='result-msg';
    document.getElementById('check-btn').style.display=currentMode==='full'?'none':'block';
    document.getElementById('reveal-answer-btn').style.display=currentMode==='full'?'none':'block';
    document.getElementById('reset-btn').style.display=currentMode==='full'?'none':'block';
    checked=false;revealed=false;
    bindSlots();
    bindChoices();
}

function bindSlots(){
    document.querySelectorAll('#answer-body .slot').forEach(slot=>{
        slot.classList.remove('filled','wrong','show-answer');slot.textContent='';slot.removeAttribute('data-filled');
        const oh=slot.parentNode.querySelector('.slot-hint');if(oh)oh.remove();
        slot.addEventListener('click',function(e){e.stopPropagation();if(checked||revealed||currentMode==='full')return;closePopup();showPopup(slot);});
    });
}
function bindChoices(){
    document.querySelectorAll('#answer-body .choice-options button').forEach(btn=>{
        btn.classList.remove('correct','wrong');
        btn.addEventListener('click',function(){
            if(checked||revealed||currentMode==='full')return;
            const parent=this.parentElement;
            parent.querySelectorAll('button').forEach(b=>b.classList.remove('correct','wrong'));
            const val=this.getAttribute('data-val');
            const slot=parent.previousElementSibling;
            if(slot&&slot.classList.contains('slot-choice')){
                slot.textContent=val;slot.setAttribute('data-filled',val);slot.classList.add('filled');
            }
        });
    });
}

function showPopup(slot){
    const q=currentCategory.questions[questionQueue[currentQuestionIndex]];
    const popup=document.createElement('div');popup.className='popup-menu';
    const currentWord=slot.getAttribute('data-filled');
    const usedWords=new Set();
    document.querySelectorAll('#answer-body .slot.filled').forEach(s=>{const w=s.getAttribute('data-filled');if(w&&s!==slot)usedWords.add(w);});
    const words=q.words||[];
    let availableWords=words.filter(w=>{if(w===currentWord)return true;if(usedWords.has(w))return false;return true;});
    availableWords.forEach(w=>{const item=document.createElement('div');item.className='menu-item';item.textContent=w;item.addEventListener('click',function(ev){ev.stopPropagation();fillSlot(slot,w);closePopup();});popup.appendChild(item);});
    if(currentWord){const clearItem=document.createElement('div');clearItem.className='menu-item clear';clearItem.textContent='🗑️ 清空';clearItem.addEventListener('click',function(ev){ev.stopPropagation();slot.textContent='';slot.classList.remove('filled','wrong');slot.removeAttribute('data-filled');const oh=slot.parentNode.querySelector('.slot-hint');if(oh)oh.remove();closePopup();});popup.appendChild(clearItem);}
    slot.parentNode.style.position='relative';slot.parentNode.appendChild(popup);popup.style.display='block';currentPopup=popup;
    const rect=slot.getBoundingClientRect(),parentRect=slot.parentNode.getBoundingClientRect();
    popup.style.left=(rect.left-parentRect.left)+'px';popup.style.top=(rect.bottom-parentRect.top)+'px';
}
function fillSlot(slot,word){slot.textContent=word;slot.setAttribute('data-filled',word);slot.classList.add('filled');slot.classList.remove('wrong');const oh=slot.parentNode.querySelector('.slot-hint');if(oh)oh.remove();document.getElementById('result-msg').textContent='';document.getElementById('result-msg').className='result-msg';}

function checkAnswers(){
    if(checked||revealed)return;
    const allSlots=document.querySelectorAll('#answer-body .slot, #answer-body .slot-choice');let allFilled=true;
    allSlots.forEach(s=>{if(!s.classList.contains('filled'))allFilled=false;});
    if(!allFilled){document.getElementById('result-msg').textContent='⚠ 请先填完所有空白再检查。';document.getElementById('result-msg').className='result-msg incorrect';return;}
    checked=true;let allCorrect=true;
    allSlots.forEach(slot=>{
        const answer=slot.getAttribute('data-answer'),filled=slot.getAttribute('data-filled');
        const oh=slot.parentNode.querySelector('.slot-hint');if(oh)oh.remove();
        if(filled!==answer){slot.classList.add('wrong');slot.classList.remove('filled');allCorrect=false;}
        else{slot.classList.add('filled');slot.classList.remove('wrong');}
    });
    const msg=document.getElementById('result-msg');
    if(allCorrect){msg.textContent='✅ 全部正确！';msg.className='result-msg correct';document.getElementById('check-btn').style.display='none';document.getElementById('reveal-answer-btn').style.display='none';document.getElementById('next-btn2').style.display='block';}
    else{msg.textContent='❌ 有错误，点击红色标记处可重新选择。';msg.className='result-msg incorrect';checked=false;document.getElementById('check-btn').disabled=true;setTimeout(()=>{document.getElementById('check-btn').disabled=false;},500);}
}
function revealAllAnswers(){
    revealed=true;checked=true;closePopup();
    document.querySelectorAll('#answer-body .slot, #answer-body .slot-choice').forEach(slot=>{
        const answer=slot.getAttribute('data-answer');
        const oh=slot.parentNode.querySelector('.slot-hint');if(oh)oh.remove();
        slot.textContent=answer;slot.setAttribute('data-filled',answer);slot.classList.add('show-answer');slot.classList.remove('filled','wrong');
    });
    document.getElementById('result-msg').textContent='💡 正确答案已显示，请仔细对照学习。';
    document.getElementById('result-msg').className='result-msg';document.getElementById('check-btn').style.display='none';
    document.getElementById('reveal-answer-btn').style.display='none';document.getElementById('next-btn2').style.display='block';
}
function resetCurrent(){closePopup();checked=false;revealed=false;document.getElementById('result-msg').textContent='';document.getElementById('result-msg').className='result-msg';document.getElementById('check-btn').style.display='block';document.getElementById('check-btn').disabled=false;document.getElementById('reveal-answer-btn').style.display='block';document.getElementById('next-btn2').style.display='none';renderMode();}
function nextQuestion(){closePopup();currentQuestionIndex++;showKeyword();}
function goHome(){closePopup();currentCategory=null;currentQuestionIndex=0;questionQueue=[];document.getElementById('home-page').style.display='block';document.getElementById('game-page').style.display='none';renderHome();window.scrollTo({top:0,behavior:'smooth'});}
function showStats(){
    const overlay=document.getElementById('stats-overlay'),box=document.getElementById('stats-box');
    let totalQ=0,totalCleared=0,html='<h3>📊 通关统计</h3>';
    categories.forEach(cat=>{const cleared=clearedCategories[cat.id]||false;totalQ+=cat.questions.length;if(cleared)totalCleared+=cat.questions.length;html+=`<div class="stat-row"><span class="stat-name">${cat.icon} ${cat.name}</span><span class="stat-val">${cleared?'✅ 已通关':'⬜ 未通关'} (${cat.questions.length}题)</span></div>`;});
    const totalRate=totalQ>0?Math.round(totalCleared/totalQ*100):0;
    html+=`<div class="stat-row" style="font-weight:bold;border-top:2px solid #a0522d;margin-top:8px;padding-top:12px;"><span>📝 总完成率</span><span>${totalRate}% (${totalCleared}/${totalQ})</span></div>`;
    html+='<button onclick="closeStats()">关闭</button>';box.innerHTML=html;overlay.classList.add('show');
}
function closeStats(){document.getElementById('stats-overlay').classList.remove('show');}
document.getElementById('stats-overlay').addEventListener('click',function(e){if(e.target===this)closeStats();});
document.addEventListener('click',function(e){if(!e.target.closest('.popup-menu')&&!e.target.closest('.slot')&&!e.target.closest('.slot-choice')){closePopup();}});
renderHome();
