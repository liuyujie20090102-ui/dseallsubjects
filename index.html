<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE 學習站 · Shelly Liu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ed;
            --text-primary: #2c2416;
            --text-secondary: #5c5347;
            --text-muted: #a09880;
            --gold: #8b6914;
            --gold-light: #c4a97d;
            --mountain-far: rgba(140,120,90,0.08);
            --mountain-mid: rgba(120,100,70,0.12);
            --mountain-near: rgba(100,80,55,0.18);
            --mountain-close: rgba(80,60,40,0.25);
            --cloud: rgba(255,252,245,0.55);
            --card-bg: rgba(255,253,248,0.65);
            --card-border: rgba(180,160,130,0.3);
            --card-hover-bg: rgba(255,253,248,0.85);
            --shadow-sm: 0 2px 16px rgba(60,40,20,0.04);
            --shadow-md: 0 8px 32px rgba(60,40,20,0.07);
            --radius: 16px;
            --font-cn: "Noto Serif TC","PingFang SC","Microsoft YaHei","KaiTi",serif;
            --font-en: "Inter","Helvetica Neue",sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background-color:var(--bg);
            font-family:var(--font-cn);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:48px 20px 80px;
            position:relative;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }
        body::before{
            content:"";
            position:fixed;top:0;left:0;width:100%;height:100%;
            pointer-events:none;z-index:0;
            background-image:
                repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(139,119,80,0.015) 3px,rgba(139,119,80,0.015) 4px),
                repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(139,119,80,0.01) 5px,rgba(139,119,80,0.01) 6px);
            opacity:0.7;
        }
        .moon{position:fixed;top:8%;right:12%;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 55% 45%,rgba(255,240,210,0.5) 0%,rgba(255,230,180,0.2) 40%,transparent 70%);pointer-events:none;z-index:0;filter:blur(4px)}
        .mountains-sky{position:fixed;top:0;left:0;width:100%;height:35%;pointer-events:none;z-index:0}
        .ms{position:absolute;border-radius:50% 50% 0 0}
        .ms1{left:55%;top:30%;width:40%;height:50%;background:var(--mountain-far)}
        .ms2{right:-5%;top:40%;width:35%;height:40%;background:var(--mountain-far);border-radius:50% 45% 0 0}
        .mountains{position:fixed;bottom:0;left:0;width:100%;height:38%;pointer-events:none;z-index:0}
        .mountain{position:absolute;bottom:0}
        .m1{left:-8%;width:50%;height:50%;background:var(--mountain-far);border-radius:55% 55% 0 0}
        .m2{left:15%;width:48%;height:65%;background:var(--mountain-mid);border-radius:50% 48% 0 0}
        .m3{left:35%;width:45%;height:55%;background:var(--mountain-near);border-radius:52% 50% 0 0}
        .m4{right:-5%;width:40%;height:70%;background:var(--mountain-close);border-radius:55% 55% 0 0}
        .water-reflect{position:fixed;bottom:0;left:0;width:100%;height:10%;pointer-events:none;z-index:0;background:linear-gradient(to top,rgba(180,160,140,0.15) 0%,transparent 100%)}
        .clouds{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
        .cloud{position:absolute;background:var(--cloud);border-radius:50%;filter:blur(35px);animation:cloudDrift var(--drift) ease-in-out infinite}
        .c1{width:350px;height:55px;left:5%;top:25%;opacity:0.5;--drift:18s}
        .c2{width:280px;height:45px;right:8%;top:45%;opacity:0.4;--drift:22s;animation-delay:-5s}
        .c3{width:400px;height:60px;left:30%;bottom:20%;opacity:0.45;--drift:20s;animation-delay:-10s}
        .c4{width:250px;height:40px;right:20%;top:15%;opacity:0.35;--drift:16s;animation-delay:-3s}
        @keyframes cloudDrift{
            0%,100%{transform:translateX(0)}
            25%{transform:translateX(25px)}
            50%{transform:translateX(-10px)}
            75%{transform:translateX(-20px)}
        }
        .pine{position:fixed;left:3%;bottom:5%;pointer-events:none;z-index:0;opacity:0.25}
        .pine .trunk{width:4px;height:50px;background:rgba(60,40,20,0.5);margin:0 auto;border-radius:2px}
        .pine .b1{border-left:20px solid transparent;border-right:20px solid transparent;border-bottom:30px solid rgba(60,40,20,0.4);border-radius:40%}
        .pine .b2{border-left:26px solid transparent;border-right:26px solid transparent;border-bottom:35px solid rgba(60,40,20,0.35);border-radius:40%;margin-top:-10px}
        .pine .b3{border-left:30px solid transparent;border-right:30px solid transparent;border-bottom:40px solid rgba(60,40,20,0.3);border-radius:40%;margin-top:-12px}
        .pine2{left:auto;right:4%;bottom:8%;opacity:0.18;transform:scale(0.7)}
        .birds{position:fixed;top:18%;left:25%;pointer-events:none;z-index:0;opacity:0.3}
        .bird{display:inline-block;font-size:13px;margin:0 6px;animation:birdFloat 6s ease-in-out infinite}
        .bird:nth-child(2){animation-delay:1.5s;font-size:9px}
        .bird:nth-child(3){animation-delay:3s;font-size:11px}
        @keyframes birdFloat{
            0%,100%{transform:translateY(0) translateX(0)}
            25%{transform:translateY(-7px) translateX(4px)}
            50%{transform:translateY(-2px) translateX(8px)}
            75%{transform:translateY(-9px) translateX(3px)}
        }
        .container{position:relative;z-index:1;width:100%;max-width:650px}
        .header{text-align:center;margin-bottom:44px}
        .header .site-title{font-size:30px;font-weight:700;color:var(--text-primary);letter-spacing:4px;margin-bottom:6px}
        .header .site-title .star-icon{display:inline-block;color:var(--gold);animation:twinkle 2s ease-in-out infinite}
        @keyframes twinkle{0%,100%{opacity:0.6}50%{opacity:1}}
        .header .subtitle{font-family:var(--font-en);font-size:11px;color:var(--text-muted);letter-spacing:5px;text-transform:uppercase}
        .quote-wrapper{text-align:center;margin-bottom:40px;min-height:32px}
        .quote-wrapper .quote-text{font-size:15px;color:var(--text-secondary);font-style:italic;letter-spacing:1px;transition:opacity 0.5s ease,transform 0.5s ease}
        .section-label{text-align:center;font-size:13px;color:var(--text-muted);letter-spacing:4px;margin-bottom:18px}
        .card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px}
        .card-grid.triple{grid-template-columns:repeat(3,1fr)}
        .card{display:block;background:var(--card-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--card-border);border-radius:var(--radius);padding:28px 16px;text-align:center;text-decoration:none;cursor:pointer;transition:all 0.35s ease;box-shadow:var(--shadow-sm)}
        .card:hover{background:var(--card-hover-bg);transform:translateY(-4px);box-shadow:var(--shadow-md)}
        .card .card-icon{font-size:26px;margin-bottom:6px;display:block;transition:transform 0.3s ease}
        .card:hover .card-icon{transform:scale(1.1)}
        .card .card-name{font-size:15px;font-weight:600;color:var(--text-primary);letter-spacing:1px}
        .card .card-status{font-size:11px;color:var(--text-muted);margin-top:3px;letter-spacing:1px}
        .card.available{border-color:rgba(139,105,20,0.25)}
        .card.available .card-name{color:#6b4e0a}
        .card.available .card-status{color:var(--gold)}
        .card.disabled{opacity:0.45;cursor:default;pointer-events:none}
        .footer{text-align:center;font-family:var(--font-en);font-size:11px;color:var(--text-muted);letter-spacing:2px;padding-top:28px}
        .footer .name{color:var(--text-secondary);font-weight:400}
        @media(max-width:600px){
            .card-grid.triple{grid-template-columns:repeat(2,1fr)}
            .card-grid.triple .card:last-child{grid-column:1/-1;max-width:100%}
        }
        @media(max-width:400px){
            .header .site-title{font-size:22px}
            .card{padding:18px 10px}
            .card .card-icon{font-size:20px}
            .card .card-name{font-size:13px}
            .card-grid{gap:8px}
        }
    </style>
</head>
<body>

    <div class="moon"></div>
    <div class="mountains-sky"><div class="ms ms1"></div><div class="ms ms2"></div></div>
    <div class="birds"><span class="bird">⩳</span><span class="bird">⩳</span><span class="bird">⩳</span></div>
    <div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="cloud c4"></div></div>
    <div class="mountains"><div class="mountain m1"></div><div class="mountain m2"></div><div class="mountain m3"></div><div class="mountain m4"></div></div>
    <div class="water-reflect"></div>
    <div class="pine"><div class="b3"></div><div class="b2"></div><div class="b1"></div><div class="trunk"></div></div>
    <div class="pine pine2"><div class="b3"></div><div class="b2"></div><div class="b1"></div><div class="trunk"></div></div>

    <div class="container">
        <div class="header">
            <div class="site-title"><span class="star-icon">✦</span> DSE 學習站</div>
            <div class="subtitle">Study · Review · Master</div>
        </div>
        <div class="quote-wrapper"><span class="quote-text" id="quote-text"></span></div>
        <div class="section-label">── 必修科 ──</div>
        <div class="card-grid">
            <a href="#" class="card disabled"><span class="card-icon">📝</span><span class="card-name">中文</span><span class="card-status">待建</span></a>
            <a href="#" class="card disabled"><span class="card-icon">🔤</span><span class="card-name">英文</span><span class="card-status">待建</span></a>
            <a href="#" class="card disabled"><span class="card-icon">📐</span><span class="card-name">數學</span><span class="card-status">待建</span></a>
            <a href="#" class="card disabled"><span class="card-icon">🏛️</span><span class="card-name">公社</span><span class="card-status">待建</span></a>
        </div>
        <div class="section-label">── 選修科 ──</div>
        <div class="card-grid triple">
            <a href="中史.html" class="card available"><span class="card-icon">🏯</span><span class="card-name">中史</span><span class="card-status">進入</span></a>
            <a href="#" class="card disabled"><span class="card-icon">📖</span><span class="card-name">歷史</span><span class="card-status">待建</span></a>
            <a href="#" class="card disabled"><span class="card-icon">🏗️</span><span class="card-name">健社</span><span class="card-status">待建</span></a>
        </div>
        <div class="footer">── <span class="name">Shelly Liu</span> ──</div>
    </div>

    <script>
        const quotes=["今天的努力，是明天的底氣。","每一個優秀的人，都有一段沉默的時光。","DSE不是終點，而是你證明自己的舞台。","知識就是力量，複習就是給力量充電。","不怕慢，就怕站。每天進步一點點。","你現在付出的每一分鐘，都在為未來投票。","自律的頂端是享受孤獨。","你未來的樣子，藏在你現在的努力裡。","唯有努力，不負光陰。","長風破浪會有時，直掛雲帆濟滄海。"];
        const quoteText=document.getElementById('quote-text');
        function showRandomQuote(){
            const ri=Math.floor(Math.random()*quotes.length);
            quoteText.style.opacity='0';quoteText.style.transform='translateY(8px)';
            setTimeout(()=>{quoteText.textContent='「 '+quotes[ri]+' 」';quoteText.style.opacity='1';quoteText.style.transform='translateY(0)';},400);
        }
        showRandomQuote();setInterval(showRandomQuote,7000);
    </script>
</body>
</html>
```
