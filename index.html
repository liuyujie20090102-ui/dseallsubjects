<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE 温故知新</title>
    <style>
        :root {
            --bg: #f5f3ee;
            --card-bg: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #b0a89c;
            --border-light: #e5e0d8;
            --gold: #c4a97d;
            --required-accent: #4a5568;
            --elective-accent: #52796f;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --font-cn: "PingFang SC", "Noto Sans TC", "Microsoft YaHei", "微軟正黑體", sans-serif;
            --font-quote: Georgia, "Noto Serif TC", "KaiTi", "楷體", serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            font-family: var(--font-cn);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景网格纹理 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 背景装饰圆 */
        .bg-circle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
        }
        .bg-circle.c1 {
            width: 400px;
            height: 400px;
            background: #52796f;
            top: -100px;
            right: -100px;
        }
        .bg-circle.c2 {
            width: 300px;
            height: 300px;
            background: #4a5568;
            bottom: -80px;
            left: -80px;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 720px;
        }

        /* 标题区 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease-out;
        }
        .header .logo {
            font-size: 14px;
            letter-spacing: 6px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 4px;
        }

        /* 金句区 */
        .quote-wrapper {
            text-align: center;
            margin-bottom: 40px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }
        .quote-wrapper .quote-mark {
            font-family: var(--font-quote);
            font-size: 48px;
            color: var(--gold);
            line-height: 1;
            margin-right: 4px;
            opacity: 0.5;
        }
        .quote-wrapper .quote-text {
            font-family: var(--font-quote);
            font-size: 15px;
            color: var(--text-secondary);
            font-style: italic;
            letter-spacing: 1px;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* 区域标题 */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 16px;
            padding-left: 4px;
            animation: fadeInUp 0.6s ease-out 0.35s both;
        }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }
        .card-grid:last-of-type {
            margin-bottom: 24px;
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 20px 24px;
            text-align: center;
            cursor: pointer;
            position: relative;
            box-shadow: var(--shadow-sm);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            text-decoration: none;
            display: block;
            border-top: 3px solid transparent;
            animation: fadeInUp 0.6s ease-out both;
        }
        .card.required {
            border-top-color: #d0d5e0;
        }
        .card.elective {
            border-top-color: #c8d6c0;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }
        .card:active {
            transform: scale(0.98);
            transition: transform 0.1s ease;
        }
        .card .card-icon {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        .card:nth-child(2) .card-icon {
            animation-delay: 0.3s;
        }
        .card:nth-child(3) .card-icon {
            animation-delay: 0.6s;
        }
        .card .card-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 1px;
        }

        /* 完成标记 */
        .card.completed::after {
            content: "";
            position: absolute;
            top: 10px;
            right: 10px;
            width: 8px;
            height: 8px;
            background: #52796f;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 2px;
            animation: fadeInUp 0.6s ease-out 0.8s both;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header h1 {
                font-size: 26px;
            }
            .quote-wrapper .quote-text {
                font-size: 14px;
            }
        }
        @media (max-width: 480px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 24px 16px;
            }
            .header h1 {
                font-size: 22px;
            }
            .card {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <div class="logo">HKDSE · 2026</div>
            <h1>温 故 知 新</h1>
            <div class="subtitle">七 科 全 收 录</div>
        </div>

        <!-- 金句 -->
        <div class="quote-wrapper">
            <span class="quote-mark">"</span>
            <span class="quote-text" id="quote-text"></span>
        </div>

        <!-- 必修科 -->
        <div class="section-title">必修科</div>
        <div class="card-grid">
            <a href="#" class="card required" style="animation-delay: 0.4s;">
                <span class="card-icon">📝</span>
                <span class="card-name">中文</span>
            </a>
            <a href="#" class="card required" style="animation-delay: 0.5s;">
                <span class="card-icon">🔤</span>
                <span class="card-name">英文</span>
            </a>
            <a href="#" class="card required" style="animation-delay: 0.6s;">
                <span class="card-icon">📐</span>
                <span class="card-name">數學</span>
            </a>
            <a href="#" class="card required" style="animation-delay: 0.7s;">
                <span class="card-icon">🏛️</span>
                <span class="card-name">公社</span>
            </a>
        </div>

        <!-- 选修科 -->
        <div class="section-title">選修科</div>
        <div class="card-grid">
            <a href="#" class="card elective completed" style="animation-delay: 0.55s;">
                <span class="card-icon">🏯</span>
                <span class="card-name">中史</span>
            </a>
            <a href="#" class="card elective" style="animation-delay: 0.65s;">
                <span class="card-icon">📖</span>
                <span class="card-name">歷史</span>
            </a>
            <a href="#" class="card elective" style="animation-delay: 0.75s;">
                <span class="card-icon">🏗️</span>
                <span class="card-name">健社</span>
            </a>
        </div>

        <!-- 页脚 -->
        <div class="footer">© 2025 DSE 溫故知新 · Powered by GitHub Pages</div>
    </div>

    <script>
        // 金句库
        const quotes = [
            "學習的痛苦是一時的，不學習的痛苦是一生的。",
            "今天的努力，是明天的底氣。",
            "每一個優秀的人，都有一段沉默的時光。",
            "DSE不是終點，而是你證明自己的舞台。",
            "知識就是力量，複習就是給力量充電。",
            "不怕慢，就怕站。每天進步一點點。",
            "你現在付出的每一分鐘，都在為未來投票。",
            "與其仰望星空，不如腳踏實地。",
            "成功的路上並不擁擠，因為堅持的人不多。",
            "把每一次複習，都當作最後一次。",
            "自律的頂端是享受孤獨。",
            "你未來的樣子，藏在你現在的努力裡。",
            "所有的一鳴驚人，都是厚積薄發。",
            "不要假裝很努力，結果不會陪你演戲。",
            "你背不下來的書，總有人能背下來。",
            "堅持很苦，但後悔更苦。",
            "唯有努力，不負光陰。",
            "心之所向，素履以往。",
            "沒有一蹴而就的成功，只有日積月累的堅持。",
            "全力以赴，而後順其自然。",
            "你有多自律，就有多自由。",
            "星光不問趕路人，時光不負有心人。",
            "積土成山，風雨興焉；積水成淵，蛟龍生焉。",
            "騏驥一躍，不能十步；駑馬十駕，功在不舍。",
            "鍥而不捨，金石可鏤。",
            "博觀而約取，厚積而薄發。",
            "書山有路勤為徑，學海無涯苦作舟。",
            "寶劍鋒從磨礪出，梅花香自苦寒來。",
            "千淘萬漉雖辛苦，吹盡狂沙始到金。",
            "長風破浪會有時，直掛雲帆濟滄海。"
        ];

        const quoteText = document.getElementById('quote-text');

        // 随机抽取一条金句
        function showRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            quoteText.style.opacity = '0';
            quoteText.style.transform = 'translateY(8px)';
            setTimeout(() => {
                quoteText.textContent = quotes[randomIndex];
                quoteText.style.opacity = '1';
                quoteText.style.transform = 'translateY(0)';
            }, 400);
        }

        // 初始显示
        showRandomQuote();

        // 每8秒自动切换
        setInterval(showRandomQuote, 8000);
    </script>
</body>
</html>
