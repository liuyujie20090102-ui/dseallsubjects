<svg width="260" height="300" viewBox="0 0 260 300">
  
  <!-- 圆 -->

  <text x="8" y="110" font-size="11" fill="#2c2416">40°</text>

  <path d="M 210,75 A 12 12 0 0 1 205 85" fill="none" stroke="#5b8def" stroke-width="1.5"/>
  <text x="215" y="80" font-size="11" fill="#2c2416">20°</text>

  <path d="M 123,248 A 16 16 0 0 1 138 252" fill="none" stroke="#5b8def" stroke-width="1.5"/>
  <text x="118" y="268" font-size="12" fill="#2c2416" font-family="serif" font-style="italic">y</text>
  
  <!-- 顶点标注 -->
  <circle cx="70" cy="55" r="2.5" fill="#2c2416"/>
  <text x="55" y="48" font-size="13" font-weight="700" fill="#2c2416">A</text>
  
  <circle cx="220" cy="70" r="2.5" fill="#2c2416"/>
  <text x="228" y="65" font-size="13" font-weight="700" fill="#2c2416">B</text>
  
  <circle cx="130" cy="260" r="2.5" fill="#2c2416"/>
  <text x="130" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#2c2416">C</text>
  
  <circle cx="20" cy="110" r="2.5" fill="#2c2416"/>
  <text x="5" y="105" font-size="13" font-weight="700" fill="#2c2416">D</text>
