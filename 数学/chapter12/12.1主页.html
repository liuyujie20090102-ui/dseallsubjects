<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12.1 · Properties of Cyclic Quadrilaterals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ed;
            --text-primary: #2c2416;
            --text-secondary: #5c5347;
            --text-muted: #a09880;
            --gold: #8b6914;
            --card-bg: rgba(255,253,248,0.75);
            --card-border: rgba(180,160,130,0.3);
            --shadow-sm: 0 2px 16px rgba(60,40,20,0.04);
            --shadow-md: 0 8px 28px rgba(60,40,20,0.07);
            --font-cn: "Noto Serif TC","PingFang SC","Microsoft YaHei","KaiTi",serif;
            --font-en: "Inter","Helvetica Neue",sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background-color:var(--bg);
            font-family:var(--font-cn);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:32px 20px 48px;
            position:relative;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }
        body::before{
            content:"";
            position:fixed;top:0;left:0;width:100%;height:100%;
            pointer-events:none;z-index:0;
            background-image:
                repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(139,119,80,0.012) 3px,rgba(139,119,80,0.012) 4px),
                repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(139,119,80,0.008) 5px,rgba(139,119,80,0.008) 6px);
            opacity:0.7;
        }
        .mountains{position:fixed;bottom:0;left:0;width:100%;height:30%;pointer-events:none;z-index:0}
        .mountain{position:absolute;bottom:0}
        .m1{left:-8%;width:45%;height:55%;background:rgba(120,100,70,0.12);border-radius:55% 55% 0 0}
        .m2{left:22%;width:50%;height:68%;background:rgba(100,80,55,0.16);border-radius:50% 48% 0 0}
        .m3{right:-8%;width:42%;height:60%;background:rgba(80,60,40,0.2);border-radius:52% 52% 0 0}
        .clouds{position:fixed;bottom:12%;left:0;width:100%;height:18%;pointer-events:none;z-index:0}
        .cloud{position:absolute;background:rgba(255,252,245,0.7);border-radius:50%;filter:blur(28px)}
        .c1{width:260px;height:50px;left:8%;bottom:30px;opacity:0.5}
        .c2{width:220px;height:42px;right:12%;bottom:15px;opacity:0.4}
        .c3{width:180px;height:35px;left:50%;bottom:8px;opacity:0.35;transform:translateX(-50%)}
        .birds{position:fixed;top:12%;right:12%;pointer-events:none;z-index:0;opacity:0.3}
        .bird{display:inline-block;font-size:13px;margin:0 5px;animation:birdFloat 6s ease-in-out infinite}
        .bird:nth-child(2){animation-delay:1.5s;font-size:9px}
        .bird:nth-child(3){animation-delay:3s;font-size:11px}
        @keyframes birdFloat{0%,100%{transform:translateY(0) translateX(0)}25%{transform:translateY(-7px) translateX(3px)}50%{transform:translateY(-2px) translateX(8px)}75%{transform:translateY(-9px) translateX(3px)}}
        .container{position:relative;z-index:1;width:100%;max-width:550px}
        .back-link{display:inline-block;color:var(--text-muted);text-decoration:none;font-size:14px;margin-bottom:24px;letter-spacing:1px}
        .back-link:hover{color:var(--gold)}
        .page-title{font-size:22px;font-weight:700;color:var(--text-primary);letter-spacing:2px;margin-bottom:4px}
        .page-subtitle{font-size:14px;color:var(--text-muted);letter-spacing:1px;margin-bottom:36px}
        .card-list{display:flex;flex-direction:column;gap:14px}
        .card{
            display:block;
            background:var(--card-bg);
            backdrop-filter:blur(10px);
            -webkit-backdrop-filter:blur(10px);
            border:1px solid var(--card-border);
            border-radius:16px;
            padding:22px 24px;
            text-decoration:none;
            text-align:center;
            transition:transform 0.3s ease,box-shadow 0.3s ease;
            box-shadow:var(--shadow-sm);
        }
        .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
        .card.available{border-color:rgba(139,105,20,0.35)}
        .card.available:hover{box-shadow:0 6px 24px rgba(139,105,20,0.1)}
        .card.pending{opacity:0.45;cursor:default;pointer-events:none}
        .card.pending:hover{transform:none;box-shadow:var(--shadow-sm)}
        .card-icon{font-size:22px;margin-bottom:4px;display:block}
        .card-name{font-size:17px;font-weight:600;color:var(--text-primary);letter-spacing:2px}
        .card.available .card-name{color:#6b4e0a}
        .card-status{font-size:11px;color:var(--gold);letter-spacing:2px;margin-top:4px}
        .card.pending .card-status{color:var(--text-muted)}
        .footer{text-align:center;font-family:var(--font-en);font-size:11px;color:var(--text-muted);letter-spacing:2px;padding-top:36px}
        @media(max-width:480px){
            .page-title{font-size:18px}
            .card{padding:18px 20px}
            .card-name{font-size:15px}
        }
    </style>
</head>
<body>
    <div class="mountains"><div class="mountain m1"></div><div class="mountain m2"></div><div class="mountain m3"></div></div>
    <div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div></div>
    <div class="birds"><span class="bird">⩳</span><span class="bird">⩳</span><span class="bird">⩳</span></div>
    <div class="container">
        <a href="目录.html" class="back-link">← Chapter 12</a>
        <div class="page-title">Properties of Cyclic Quadrilaterals</div>
        <div class="page-subtitle">12.1 · 圆内接四边形的性质</div>
        <div class="card-list">
            <a href="12.1例题主页.html" class="card available">
                <span class="card-icon">📝</span>
                <span class="card-name">例题</span>
                <span class="card-status">进入 →</span>
            </a>
            <a href="12.1定理主页.html" class="card available">
                <span class="card-icon">📐</span>
                <span class="card-name">定理</span>
                <span class="card-status">进入 →</span>
            </a>
            <div class="card pending">
                <span class="card-icon">✏️</span>
                <span class="card-name">练习</span>
                <span class="card-status">待建</span>
            </div>
        </div>
        <div class="footer">── Shelly Liu ──</div>
    </div>
</body>
</html>
