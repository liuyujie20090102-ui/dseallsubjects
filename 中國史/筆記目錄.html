    <style>
        :root {
            --bg: #f7f4ed;
            --text-primary: #2c2416;
            --text-secondary: #5c5347;
            --text-muted: #a09880;
            --gold: #8b6914;
            --gold-light: #c4a97d;
            --card-bg: rgba(255,253,248,0.75);
            --card-border: rgba(180,160,130,0.25);
            --font-cn: "Noto Serif TC","PingFang SC","Microsoft YaHei","KaiTi",serif;
            --font-en: "Inter","Helvetica Neue",sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background-color:var(--bg);
            font-family:var(--font-cn);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:32px 20px 48px;
            position:relative;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }
        body::before{
            content:"";
            position:fixed;top:0;left:0;width:100%;height:100%;
            pointer-events:none;z-index:0;
            background-image:
                repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(139,119,80,0.012) 3px,rgba(139,119,80,0.012) 4px),
                repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(139,119,80,0.008) 5px,rgba(139,119,80,0.008) 6px);
            opacity:0.7;
        }
        .mountains{position:fixed;bottom:0;left:0;width:100%;height:30%;pointer-events:none;z-index:0}
        .mountain{position:absolute;bottom:0}
        .m1{left:-8%;width:45%;height:55%;background:rgba(120,100,70,0.12);border-radius:55% 55% 0 0}
        .m2{left:22%;width:50%;height:68%;background:rgba(100,80,55,0.16);border-radius:50% 48% 0 0}
        .m3{right:-8%;width:42%;height:60%;background:rgba(80,60,40,0.2);border-radius:52% 52% 0 0}
        .clouds{position:fixed;bottom:12%;left:0;width:100%;height:18%;pointer-events:none;z-index:0}
        .cloud{position:absolute;background:rgba(255,252,245,0.7);border-radius:50%;filter:blur(28px)}
        .c1{width:260px;height:50px;left:8%;bottom:30px;opacity:0.5}
        .c2{width:220px;height:42px;right:12%;bottom:15px;opacity:0.4}
        .c3{width:180px;height:35px;left:50%;bottom:8px;opacity:0.35;transform:translateX(-50%)}
        .birds{position:fixed;top:12%;right:12%;pointer-events:none;z-index:0;opacity:0.3}
        .bird{display:inline-block;font-size:13px;margin:0 5px;animation:birdFloat 6s ease-in-out infinite}
        .bird:nth-child(2){animation-delay:1.5s;font-size:9px}
        .bird:nth-child(3){animation-delay:3s;font-size:11px}
        @keyframes birdFloat{0%,100%{transform:translateY(0) translateX(0)}25%{transform:translateY(-7px) translateX(3px)}50%{transform:translateY(-2px) translateX(8px)}75%{transform:translateY(-9px) translateX(3px)}}
        .container{position:relative;z-index:1;width:100%;max-width:650px}
        .back-link{display:inline-block;color:var(--text-muted);text-decoration:none;font-size:14px;margin-bottom:24px;letter-spacing:1px;transition:color 0.3s}
        .back-link:hover{color:var(--gold)}
        .page-title{text-align:center;font-size:28px;font-weight:700;color:var(--text-primary);letter-spacing:4px;margin-bottom:32px}
        .section{margin-bottom:4px}
        .section-header{
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:16px 18px;
            cursor:pointer;
            border-radius:12px;
            transition:background 0.2s ease;
            user-select:none;
        }
        .section-header:hover{background:rgba(180,160,130,0.08)}
        .section-header .left{display:flex;align-items:baseline;gap:8px}
        .section-title{font-size:17px;font-weight:600;color:var(--text-primary);letter-spacing:2px}
        .section-period{font-size:13px;color:var(--text-muted);letter-spacing:1px}
        .section-arrow{font-size:14px;color:var(--text-muted);transition:transform 0.3s ease}
        .section.open .section-arrow{transform:rotate(90deg)}
        .section-body{overflow:hidden;max-height:0;transition:max-height 0.35s ease}
        .section.open .section-body{max-height:800px}
        .section-body-inner{padding:2px 18px 12px;display:flex;flex-direction:column;gap:1px}
        .sub-link{
            display:block;
            padding:7px 14px;
            border-radius:8px;
            text-decoration:none;
            color:var(--text-secondary);
            font-size:15px;
            letter-spacing:1px;
            transition:background 0.2s ease,color 0.2s ease;
        }
        .sub-link:hover{background:rgba(180,160,130,0.1);color:var(--text-primary)}
        .sub-link.l2{padding-left:32px;font-size:14px}
        .sub-link .dot{color:var(--gold-light);margin-right:8px}
        .divider{height:1px;background:rgba(180,160,130,0.15);margin:2px 0}
        .footer{text-align:center;font-family:var(--font-en);font-size:11px;color:var(--text-muted);letter-spacing:2px;padding-top:32px}
        @media(max-width:480px){
            .page-title{font-size:22px}
            .section-title{font-size:15px}
            .sub-link{font-size:14px}
        }
    </style>
</head>

    <script>
        function toggleSection(header){
            const section=header.parentElement;
            section.classList.toggle('open');
            saveState();
        }

        function saveState(){
            const sections=document.querySelectorAll('.section');
            const openSections=[];
            sections.forEach(s=>{
                if(s.classList.contains('open'))openSections.push(s.dataset.section);
            });
            localStorage.setItem('cn-history-toc-open',JSON.stringify(openSections));
        }

        function loadState(){
            const saved=localStorage.getItem('cn-history-toc-open');
            if(!saved)return;
            const openSections=JSON.parse(saved);
            openSections.forEach(id=>{
                const section=document.querySelector(`[data-section="${id}"]`);
                if(section)section.classList.add('open');
            });
        }

        loadState();
    </script>
